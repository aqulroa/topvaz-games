<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="512" height="512" fill="url(#bg)" rx="80"/>
<!-- Rocket body -->
<rect x="230" y="120" width="52" height="160" rx="26" fill="#e94560"/>
<!-- Rocket nose -->
<polygon points="256,60 210,140 302,140" fill="#e94560"/>
<!-- Rocket window -->
<circle cx="256" cy="170" r="20" fill="#0f3460" stroke="#fff" stroke-width="3"/>
<circle cx="256" cy="170" r="10" fill="#4fc3f7"/>
<!-- Rocket fins -->
<polygon points="210,240 190,300 230,280" fill="#c0392b"/>
<polygon points="302,240 322,300 282,280" fill="#c0392b"/>
<!-- Flame -->
<polygon points="240,280 256,360 272,280" fill="#f39c12"/>
<polygon points="246,280 256,330 266,280" fill="#f1c40f"/>
<!-- Stars -->
<circle cx="100" cy="100" r="3" fill="#fff"/>
<circle cx="400" cy="80" r="2" fill="#fff"/>
<circle cx="80" cy="350" r="2" fill="#fff"/>
<circle cx="420" cy="300" r="3" fill="#fff"/>
<circle cx="150" cy="400" r="2" fill="#fff"/>
<circle cx="380" cy="420" r="2" fill="#fff"/>
<!-- Title -->
<text x="256" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="42" fill="#e94560">JET</text>
<text x="256" y="485" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="42" fill="#4fc3f7">BOY</text>
</svg>