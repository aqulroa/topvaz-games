<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренер Аима 3D - Играть онлайн</title>
<link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#000;color:#e8eaf6;overflow:hidden;height:100vh}
a{text-decoration:none}
canvas{display:block}

/* BLOCKER / MENU */
#blocker{position:fixed;inset:0;z-index:300;background:rgba(5,8,16,0.95);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
#blocker.hidden{display:none}
.menu-box{text-align:center;max-width:560px;width:92%;padding:30px;background:rgba(15,20,45,0.8);border:1px solid rgba(0,212,255,0.15);border-radius:20px;max-height:90vh;overflow-y:auto}
.menu-title{font-size:1.8rem;font-weight:900;margin-bottom:5px;background:linear-gradient(135deg,#00d4ff,#7b61ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.menu-sub{color:rgba(232,234,246,0.4);margin-bottom:18px;font-size:.85rem}
.modes{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.mode-btn{padding:11px 18px;border:1px solid rgba(0,212,255,0.2);border-radius:12px;background:rgba(0,212,255,0.06);color:#e8eaf6;font-family:'Poppins';font-size:.88rem;cursor:pointer;transition:all .3s;text-align:left}
.mode-btn:hover{background:rgba(0,212,255,0.15);border-color:#00d4ff;transform:translateX(4px)}
.mn{display:block;font-weight:700;color:#00d4ff;font-size:.93rem}
.md{display:block;font-size:.73rem;color:rgba(232,234,246,0.35);margin-top:1px}

/* Settings in menu */
.menu-settings{border-top:1px solid rgba(0,212,255,0.1);padding-top:15px;margin-top:12px;text-align:left}
.menu-settings h4{color:#00d4ff;font-size:.85rem;margin-bottom:12px;text-align:center}
.msg{margin-bottom:14px}
.msg>label{display:block;font-size:.75rem;color:rgba(232,234,246,0.45);margin-bottom:5px}
.mcr{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.mcs{width:28px;height:28px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.mcs:hover,.mcs.on{border-color:#fff;transform:scale(1.1)}
.mtr{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
.mtl{font-size:.82rem;color:#e8eaf6}
.mtg{width:40px;height:20px;background:rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;position:relative;transition:background .3s}
.mtg.on{background:rgba(0,212,255,0.4)}
.mtg::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .3s}
.mtg.on::after{transform:translateX(20px)}
input[type=range]{width:100%;accent-color:#00d4ff;margin-top:3px}

.results{display:none}.results.active{display:block}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.res-item{background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.1);border-radius:10px;padding:12px}
.res-label{font-size:.7rem;color:rgba(232,234,246,0.35)}.res-value{font-size:1.3rem;font-weight:700;color:#00d4ff}
.btn-p{padding:10px 30px;border:none;border-radius:22px;background:linear-gradient(135deg,#00d4ff,#7b61ff);color:#fff;font-family:'Poppins';font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,212,255,0.4)}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;pointer-events:none;display:none}
#hud.active{display:flex}
.hud-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:8px 16px;background:rgba(5,8,16,0.7);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,212,255,0.1)}
.hud-left a{color:#00d4ff;font-weight:600;font-size:.85rem;pointer-events:auto}
.hud-stats{display:flex;gap:10px;font-size:.78rem}
.hud-s{background:rgba(0,212,255,0.08);padding:3px 10px;border-radius:12px;border:1px solid rgba(0,212,255,0.12)}
.hud-s span{color:#00d4ff;font-weight:700}

/* Crosshair */
#cross{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99;pointer-events:none;display:none;width:24px;height:24px}
#cross.active{display:block}
.chh,.chv{position:absolute;background:#00d4ff}
.chh{width:16px;height:2px;top:11px;left:0}
.chv{width:2px;height:16px;left:11px;top:0}
.chd{width:3px;height:3px;background:#fff;border-radius:50%;position:absolute;left:10.5px;top:10.5px}
</style>
</head>
<body>

<!-- MENU -->
<div id="blocker">
  <div class="menu-box">
    <div class="menu-title" id="mTitle">Тренер Аима 3D</div>
    <div class="menu-sub" id="mSub">Выбери режим и настрой игру</div>

    <div class="modes" id="modes">
      <button class="mode-btn" onclick="go('s',1)"><span class="mn">Статичный — Уровень 1</span><span class="md">Большие медленные шары</span></button>
      <button class="mode-btn" onclick="go('s',2)"><span class="mn">Статичный — Уровень 2</span><span class="md">Средние шары</span></button>
      <button class="mode-btn" onclick="go('s',3)"><span class="mn">Статичный — Уровень 3</span><span class="md">Маленькие и быстрые</span></button>
      <button class="mode-btn" onclick="go('t',1)"><span class="mn">Трекинг — Уровень 1</span><span class="md">Медленные движущиеся</span></button>
      <button class="mode-btn" onclick="go('t',2)"><span class="mn">Трекинг — Уровень 2</span><span class="md">Быстрые движущиеся</span></button>
      <button class="mode-btn" onclick="go('t',3)"><span class="mn">Трекинг — Уровень 3</span><span class="md">Очень быстрые</span></button>
    </div>

    <!-- SETTINGS IN MENU -->
    <div class="menu-settings">
      <h4>⚙ Настройки</h4>
      <div class="msg"><label>Цвет стен</label><div class="mcr" data-s="wall">
        <div class="mcs on" style="background:#1a2a4a" data-v="0x1a2a4a"></div>
        <div class="mcs" style="background:#2a1a3a" data-v="0x2a1a3a"></div>
        <div class="mcs" style="background:#1a3a2a" data-v="0x1a3a2a"></div>
        <div class="mcs" style="background:#3a2a1a" data-v="0x3a2a1a"></div>
        <div class="mcs" style="background:#1a1a1a" data-v="0x1a1a1a"></div>
      </div></div>
      <div class="msg"><label>Цвет целей</label><div class="mcr" data-s="target">
        <div class="mcs on" style="background:#00d4ff" data-v="0x00d4ff"></div>
        <div class="mcs" style="background:#7b61ff" data-v="0x7b61ff"></div>
        <div class="mcs" style="background:#ff6b9d" data-v="0xff6b9d"></div>
        <div class="mcs" style="background:#00ff88" data-v="0x00ff88"></div>
        <div class="mcs" style="background:#ffd700" data-v="0xffd700"></div>
        <div class="mcs" style="background:#ff4444" data-v="0xff4444"></div>
      </div></div>
      <div class="msg"><label>Чувствительность: <span id="sensVal">5</span></label>
        <input type="range" min="1" max="10" value="5" id="sensSlider" oninput="document.getElementById('sensVal').textContent=this.value">
      </div>
      <div class="msg">
        <div class="mtr"><span class="mtl">Оружие</span><div class="mtg on" id="tW" onclick="this.classList.toggle('on')"></div></div>
        <div class="mtr"><span class="mtl">Звук</span><div class="mtg" id="tS" onclick="this.classList.toggle('on')"></div></div>
      </div>
    </div>

    <div class="results" id="res">
      <div class="menu-title" style="font-size:1.5rem">Результаты</div>
      <div class="res-grid">
        <div class="res-item"><div class="res-label">Счёт</div><div class="res-value" id="rS">0</div></div>
        <div class="res-item"><div class="res-label">Точность</div><div class="res-value" id="rA">0%</div></div>
        <div class="res-item"><div class="res-label">Ср. реакция</div><div class="res-value" id="rR">0мс</div></div>
        <div class="res-item"><div class="res-label">Целей/сек</div><div class="res-value" id="rP">0</div></div>
      </div>
      <button class="btn-p" onclick="showMenu()">Играть снова</button>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-bar">
    <div class="hud-left"><a href="../index.html">&larr; aqulroa Games</a></div>
    <div class="hud-stats">
      <div class="hud-s">Счёт: <span id="score">0</span></div>
      <div class="hud-s">Время: <span id="timer">30</span>с</div>
      <div class="hud-s">Точность: <span id="acc">100</span>%</div>
      <div class="hud-s">Ур: <span id="lvl">-</span></div>
    </div>
  </div>
</div>

<div id="cross"><div class="chh"></div><div class="chv"></div><div class="chd"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === THREE.JS ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050810);
scene.fog = new THREE.Fog(0x050810, 25, 55);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0x223344, 0.5));
const dl = new THREE.DirectionalLight(0xffffff, 0.3);
dl.position.set(5, 10, 5); dl.castShadow = true; scene.add(dl);
const pl = new THREE.PointLight(0x00d4ff, 0.5, 30);
pl.position.set(0, 4, 0); scene.add(pl);

// === ARENA ===
let wallColor = 0x1a2a4a, targetColor = 0x00d4ff;
let arenaParts = [];

function buildArena() {
  arenaParts.forEach(m => scene.remove(m)); arenaParts = [];
  const wm = new THREE.MeshStandardMaterial({ color: wallColor, roughness: 0.8 });
  const fm = new THREE.MeshStandardMaterial({ color: 0x0a0e1a, roughness: 0.9 });

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(24, 24), fm);
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
  scene.add(floor); arenaParts.push(floor);

  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(24, 24), wm);
  ceil.rotation.x = Math.PI / 2; ceil.position.y = 5;
  scene.add(ceil); arenaParts.push(ceil);

  [[0,2.5,-12,0,0,0],[0,2.5,12,0,Math.PI,0],[-12,2.5,0,0,Math.PI/2,0],[12,2.5,0,0,-Math.PI/2,0]].forEach(p => {
    const w = new THREE.Mesh(new THREE.PlaneGeometry(24, 5), wm);
    w.position.set(p[0],p[1],p[2]); w.rotation.set(p[3],p[4],p[5]); w.receiveShadow = true;
    scene.add(w); arenaParts.push(w);
  });

  const grid = new THREE.GridHelper(24, 24, 0x00d4ff, 0x00d4ff);
  grid.material.opacity = 0.04; grid.material.transparent = true; grid.position.y = 0.01;
  scene.add(grid); arenaParts.push(grid);
}
buildArena();

// === WEAPON ===
const weapon = new THREE.Group();
(function buildWeapon() {
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.03, 0.45, 8), new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.3 }));
  barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0, -0.25); weapon.add(barrel);

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.25), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6 }));
  body.position.set(0, -0.02, -0.05); weapon.add(body);

  const grip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.14, 0.06), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
  grip.position.set(0, -0.1, 0.05); grip.rotation.x = 0.2; weapon.add(grip);

  const sight = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.03, 0.01), new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x00d4ff, emissiveIntensity: 0.5 }));
  sight.position.set(0, 0.07, -0.15); weapon.add(sight);

  const mag = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.1, 0.05), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.7 }));
  mag.position.set(0.02, -0.1, -0.08); weapon.add(mag);

  const ml = new THREE.PointLight(0xffaa33, 0, 3); ml.position.set(0, 0, -0.5);
  weapon.add(ml); weapon.userData.ml = ml;
})();

// Proper first-person weapon position (right side, like holding)
weapon.position.set(0.18, -0.15, -0.4);
camera.add(weapon);
scene.add(camera);

// === FPS CAMERA (fixed Y-axis with yaw/pitch) ===
let yaw = 0, pitch = 0;
const pitchObj = new THREE.Object3D();
const yawObj = new THREE.Object3D();
yawObj.position.set(0, 1.7, 0);
yawObj.add(pitchObj);
pitchObj.add(camera);
camera.position.set(0, 0, 0);
scene.add(yawObj);

// === GAME STATE ===
let targets = [], movingTargets = [], active = false, mode = 's', lvl = 1;
let score = 0, shots = 0, hits = 0, timeLeft = 30;
let gt, st, mt, reactionTimes = [];

const CFG = {
  s: { 1: { r: 1400, sz: 0.5, d: 30 }, 2: { r: 900, sz: 0.35, d: 30 }, 3: { r: 550, sz: 0.2, d: 30 } },
  t: { 1: { r: 2200, sz: 0.45, sp: 1.5, d: 30 }, 2: { r: 1800, sz: 0.35, sp: 3, d: 30 }, 3: { r: 1400, sz: 0.25, sp: 5, d: 30 } }
};

function spawn() {
  if (!active) return;
  const c = CFG[mode][lvl];
  const geo = new THREE.SphereGeometry(c.sz, 16, 16);
  const mat = new THREE.MeshStandardMaterial({ color: targetColor, emissive: targetColor, emissiveIntensity: 0.6, roughness: 0.3 });
  const m = new THREE.Mesh(geo, mat);

  // Glow
  const gGeo = new THREE.SphereGeometry(c.sz * 1.3, 16, 16);
  const gMat = new THREE.MeshBasicMaterial({ color: targetColor, transparent: true, opacity: 0.15 });
  m.add(new THREE.Mesh(gGeo, gMat));

  m.position.set((Math.random() - 0.5) * 20, 0.5 + Math.random() * 3.5, (Math.random() - 0.5) * 20);
  m.userData = { spawn: Date.now(), isTarget: true, pts: c.sz < 0.25 ? 35 : c.sz < 0.4 ? 25 : 15 };

  if (mode === 't') {
    m.userData.vel = new THREE.Vector3((Math.random() - 0.5) * c.sp, (Math.random() - 0.5) * c.sp * 0.4, (Math.random() - 0.5) * c.sp);
    movingTargets.push(m);
  }

  scene.add(m); targets.push(m);
  setTimeout(() => { if (m.parent) { scene.remove(m); targets.splice(targets.indexOf(m), 1); const j = movingTargets.indexOf(m); if (j > -1) movingTargets.splice(j, 1); } }, mode === 't' ? 5000 : lvl === 3 ? 1800 : 3000);
}

function moveTargets() {
  movingTargets.forEach(m => {
    if (!m.parent) return;
    m.position.add(m.userData.vel);
    if (m.position.x < -11 || m.position.x > 11) m.userData.vel.x *= -1;
    if (m.position.y < 0.3 || m.position.y > 4.5) m.userData.vel.y *= -1;
    if (m.position.z < -11 || m.position.z > 11) m.userData.vel.z *= -1;
    m.position.clamp(new THREE.Vector3(-11, 0.3, -11), new THREE.Vector3(11, 4.5, 11));
  });
}

// === HIT EFFECTS ===
function hitFx(pos) {
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.1, 0.15, 16), new THREE.MeshBasicMaterial({ color: targetColor, transparent: true, opacity: 1, side: THREE.DoubleSide }));
  ring.position.copy(pos); ring.lookAt(yawObj.position); scene.add(ring);
  let s = 1; const a = () => { s += 0.15; ring.scale.set(s, s, s); ring.material.opacity -= 0.05; ring.material.opacity > 0 ? requestAnimationFrame(a) : scene.remove(ring); }; a();

  for (let i = 0; i < 8; i++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4, 4), new THREE.MeshBasicMaterial({ color: targetColor }));
    p.position.copy(pos); scene.add(p);
    const v = new THREE.Vector3((Math.random() - 0.5) * 0.3, Math.random() * 0.2, (Math.random() - 0.5) * 0.3);
    let l = 1; const pa = () => { p.position.add(v); v.y -= 0.01; l -= 0.04; p.material.opacity = l; p.material.transparent = true; l > 0 ? requestAnimationFrame(pa) : scene.remove(p); }; pa();
  }

  if (document.getElementById('tS').classList.contains('on')) {
    try { const c = new AudioContext(), o = c.createOscillator(), g = c.createGain(); o.connect(g); g.connect(c.destination); o.frequency.value = 800; g.gain.value = 0.08; o.start(); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08); o.stop(c.currentTime + 0.1); } catch (e) {}
  }
}

// === SHOOTING ===
const raycaster = new THREE.Raycaster();

function shoot() {
  if (!active) return;
  shots++;

  // Muzzle flash
  const ml = weapon.userData.ml; ml.intensity = 2; setTimeout(() => ml.intensity = 0, 50);

  // Recoil
  weapon.position.z += 0.03; weapon.rotation.x -= 0.06;
  setTimeout(() => { weapon.position.z = -0.4; weapon.rotation.x = 0; }, 80);

  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const hits_arr = raycaster.intersectObjects(targets, true);

  if (hits_arr.length > 0) {
    let obj = hits_arr[0].object;
    while (obj && !obj.userData.isTarget) obj = obj.parent;
    if (obj && obj.userData.isTarget) {
      reactionTimes.push(Date.now() - obj.userData.spawn);
      score += obj.userData.pts; hits++;
      hitFx(obj.position.clone());
      scene.remove(obj); targets.splice(targets.indexOf(obj), 1);
      const j = movingTargets.indexOf(obj); if (j > -1) movingTargets.splice(j, 1);
      updHUD(); return;
    }
  }
  updHUD();
}

// === POINTER LOCK ===
let isLocked = false;
renderer.domElement.addEventListener('click', () => { if (active && !isLocked) renderer.domElement.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === renderer.domElement;
  document.getElementById('cross').classList.toggle('active', isLocked && active);
  document.getElementById('blocker').classList.toggle('hidden', isLocked);
});

// Mouse look with FIXED Y-axis
document.addEventListener('mousemove', e => {
  if (!isLocked || !active) return;
  const sens = parseFloat(document.getElementById('sensSlider').value) * 0.001;
  yaw -= e.movementX * sens;
  pitch -= e.movementY * sens;
  pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
  yawObj.rotation.y = yaw;
  pitchObj.rotation.x = pitch;
});

document.addEventListener('mousedown', e => { if (isLocked && active && e.button === 0) shoot(); });

// === GAME ===
function go(m, l) {
  mode = m; lvl = l; score = 0; shots = 0; hits = 0; reactionTimes = []; movingTargets = [];
  timeLeft = CFG[m][l].d; active = true;
  targets.forEach(t => scene.remove(t)); targets = [];

  yaw = 0; pitch = 0; yawObj.rotation.y = 0; pitchObj.rotation.x = 0;

  // Apply settings
  const weaponOn = document.getElementById('tW').classList.contains('on');
  weapon.visible = weaponOn;

  document.getElementById('blocker').classList.add('hidden');
  document.getElementById('hud').classList.add('active');
  document.getElementById('lvl').textContent = l;
  renderer.domElement.requestPointerLock();
  updHUD();

  gt = setInterval(() => { timeLeft--; document.getElementById('timer').textContent = timeLeft; if (timeLeft <= 0) endGame(); }, 1000);
  spawn(); st = setInterval(spawn, CFG[m][l].r);
  if (m === 't') mt = setInterval(moveTargets, 20);
}

function endGame() {
  active = false; clearInterval(gt); clearInterval(st); clearInterval(mt);
  document.exitPointerLock();
  targets.forEach(t => scene.remove(t)); targets = []; movingTargets = [];

  const acc = shots > 0 ? Math.round(hits / shots * 100) : 0;
  const avg = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length) : 0;
  const spd = (hits / CFG[mode][lvl].d).toFixed(1);

  document.getElementById('rS').textContent = score;
  document.getElementById('rA').textContent = acc + '%';
  document.getElementById('rR').textContent = avg + 'мс';
  document.getElementById('rP').textContent = spd;

  document.getElementById('modes').style.display = 'none';
  document.querySelector('.menu-settings').style.display = 'none';
  document.getElementById('res').classList.add('active');
  document.getElementById('mTitle').textContent = 'Результаты';
  document.getElementById('mSub').textContent = (mode === 's' ? 'Статичный' : 'Трекинг') + ' — Уровень ' + lvl;
  document.getElementById('blocker').classList.remove('hidden');
  document.getElementById('hud').classList.remove('active');
  document.getElementById('cross').classList.remove('active');
}

function showMenu() {
  active = false; clearInterval(gt); clearInterval(st); clearInterval(mt);
  targets.forEach(t => scene.remove(t)); targets = []; movingTargets = [];
  document.exitPointerLock();

  document.getElementById('modes').style.display = 'flex';
  document.querySelector('.menu-settings').style.display = 'block';
  document.getElementById('res').classList.remove('active');
  document.getElementById('mTitle').textContent = 'Тренер Аима 3D';
  document.getElementById('mSub').textContent = 'Выбери режим и настрой игру';
  document.getElementById('blocker').classList.remove('hidden');
  document.getElementById('hud').classList.remove('active');
  document.getElementById('cross').classList.remove('active');
  document.getElementById('score').textContent = '0';
  document.getElementById('timer').textContent = '30';
  document.getElementById('acc').textContent = '100';
  document.getElementById('lvl').textContent = '-';
}

function updHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('acc').textContent = shots > 0 ? Math.round(hits / shots * 100) : 100;
}

// === MENU SETTINGS COLOR PICKERS ===
document.querySelectorAll('.mcs').forEach(sw => {
  sw.addEventListener('click', function () {
    const s = this.closest('[data-s]').dataset.s;
    this.closest('.mcr').querySelectorAll('.mcs').forEach(x => x.classList.remove('on'));
    this.classList.add('on');
    const v = parseInt(this.dataset.v);
    if (s === 'wall') { wallColor = v; buildArena(); }
    else if (s === 'target') { targetColor = v; }
  });
});

// === RENDER LOOP ===
function animate() {
  requestAnimationFrame(animate);
  if (active && mode === 't') moveTargets();
  if (weapon.visible) {
    weapon.position.x = 0.18 + Math.sin(Date.now() * 0.002) * 0.004;
    weapon.position.y = -0.15 + Math.sin(Date.now() * 0.003) * 0.002;
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
