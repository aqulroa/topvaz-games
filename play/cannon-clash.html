<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannon Clash</title>
<link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(180deg,#87CEEB,#4682B4);overflow:hidden;height:100vh}
canvas{display:block}
#blocker{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center}
#blocker.hidden{display:none}
.box{text-align:center;max-width:700px;width:92%;padding:40px;background:linear-gradient(135deg,#2C3E50,#34495E);border:3px solid #FFD700;border-radius:20px;max-height:90vh;overflow-y:auto}
.mt{font-size:3rem;font-weight:900;margin-bottom:10px;color:#FFD700;text-shadow:3px 3px 6px #000}
.ms{color:#ECF0F1;margin-bottom:30px;font-size:1.1rem}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-top:20px}
.level-btn{background:linear-gradient(135deg,#3498DB,#2980B9);border:none;padding:20px;border-radius:15px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:inherit}
.level-btn:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.3)}
.level-btn.locked{background:linear-gradient(135deg,#7F8C8D,#95A5A6);cursor:not-allowed;opacity:0.5}
.level-stars{font-size:14px;margin-top:5px;color:#FFD700}
#hud{position:fixed;top:20px;left:20px;right:20px;z-index:100;pointer-events:none;display:none}
#hud.on{display:flex;justify-content:space-between}
.hi{background:rgba(0,0,0,0.7);padding:10px 20px;border-radius:15px;color:#fff;font-weight:600;font-size:18px;border:2px solid rgba(255,255,255,0.3)}
.hi span{color:#FFD700}
.res{display:none}
.res.on{display:block;margin-top:20px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0}
.ri{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-radius:10px;padding:15px}
.rl{font-size:0.8rem;color:rgba(255,255,255,0.6)}
.rv{font-size:1.5rem;font-weight:700;color:#FFD700}
.btn{padding:12px 30px;border:none;border-radius:20px;background:linear-gradient(135deg,#3498DB,#2980B9);color:#fff;font-family:Poppins,sans-serif;font-size:1rem;font-weight:600;cursor:pointer;margin-top:10px}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(52,152,219,0.4)}
#powerBar{position:fixed;left:50px;top:50%;transform:translateY(-50%);width:30px;height:200px;background:rgba(0,0,0,0.5);border-radius:15px;border:2px solid #fff;overflow:hidden;display:none;z-index:50}
#powerBar.show{display:block}
#powerFill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#27AE60,#F39C12,#E74C3C);height:0%;transition:height 0.05s}
#ballSelector{position:fixed;right:50px;top:50%;transform:translateY(-50%);display:none;flex-direction:column;gap:10px;z-index:50}
#ballSelector.show{display:flex}
.ball-type{width:60px;height:60px;border-radius:50%;border:3px solid #fff;cursor:pointer;transition:all 0.3s;pointer-events:auto;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:12px;position:relative}
.ball-type:hover{transform:scale(1.1)}
.ball-type.selected{border-color:#FFD700;box-shadow:0 0 20px #FFD700}
.ball-type.disabled{opacity:0.3;cursor:not-allowed;pointer-events:none}
.ball-count{position:absolute;top:-5px;right:-5px;background:#E74C3C;width:24px;height:24px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
#menuScreen{display:block}
#levelScreen{display:none}
.menu-btn{padding:15px 40px;font-size:1.2rem;margin:10px}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="blocker">
<div class="box">
<div id="menuScreen">
<div class="mt">CANNON CLASH</div>
<button class="btn menu-btn" onclick="showLevelSelect()">Играть</button>
</div>
<div id="levelScreen">
<div class="mt" style="font-size:2rem">Выбери уровень</div>
<div class="level-grid" id="levelGrid"></div>
<button class="btn" onclick="showMainMenu()" style="margin-top:20px">Назад</button>
</div>
<div class="res" id="rr">
<div class="mt" style="font-size:2rem">Результаты</div>
<div class="rg">
<div class="ri"><div class="rl">Счёт</div><div class="rv" id="rs">0</div></div>
<div class="ri"><div class="rl">Звёзды</div><div class="rv" id="rst">0</div></div>
</div>
<button class="btn" onclick="showLevelSelect()">Выбрать уровень</button>
</div>
</div>
</div>
<div id="hud">
<div class="hi">Уровень: <span id="lv">1</span></div>
<div class="hi">Ядра: <span id="bl">5</span></div>
<div class="hi">Счёт: <span id="sc">0</span></div>
</div>
<div id="powerBar"><div id="powerFill"></div></div>
<div id="ballSelector">
<div class="ball-type selected" data-type="normal" style="background:#1A1A1A"><div class="ball-count">∞</div></div>
<div class="ball-type disabled" data-type="explosive" style="background:#FF4444"><div class="ball-count" id="explosiveCount">0</div></div>
<div class="ball-type disabled" data-type="heavy" style="background:#808080"><div class="ball-count" id="heavyCount">0</div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const LEVELS=[
{id:1,balls:5,pirates:[{x:900,y:400}],structures:[{type:'wood',x:900,y:450,w:100,h:20}],special:{explosive:0,heavy:0}},
{id:2,balls:6,pirates:[{x:850,y:350},{x:950,y:350}],structures:[{type:'wood',x:900,y:450,w:150,h:20},{type:'wood',x:850,y:400,w:20,h:80},{type:'wood',x:950,y:400,w:20,h:80}],special:{explosive:0,heavy:0}},
{id:3,balls:7,pirates:[{x:800,y:300},{x:900,y:300},{x:1000,y:300}],structures:[{type:'wood',x:800,y:450,w:100,h:20},{type:'wood',x:800,y:380,w:20,h:100},{type:'wood',x:800,y:330,w:80,h:20},{type:'wood',x:1000,y:450,w:100,h:20},{type:'wood',x:1000,y:380,w:20,h:100},{type:'wood',x:1000,y:330,w:80,h:20}],special:{explosive:0,heavy:0}},
{id:4,balls:8,pirates:[{x:850,y:250},{x:950,y:250},{x:900,y:350}],structures:[{type:'wood',x:900,y:450,w:200,h:20},{type:'wood',x:820,y:400,w:20,h:80},{type:'wood',x:980,y:400,w:20,h:80},{type:'wood',x:900,y:380,w:120,h:20},{type:'wood',x:850,y:320,w:20,h:100},{type:'wood',x:950,y:320,w:20,h:100},{type:'wood',x:900,y:280,w:80,h:20}],special:{explosive:0,heavy:0}},
{id:5,balls:7,pirates:[{x:850,y:300},{x:1000,y:300}],structures:[{type:'wood',x:850,y:450,w:100,h:20},{type:'wood',x:850,y:380,w:20,h:100},{type:'wood',x:850,y:330,w:80,h:20},{type:'tnt',x:925,y:430,r:25},{type:'wood',x:1000,y:450,w:100,h:20},{type:'wood',x:1000,y:380,w:20,h:100},{type:'wood',x:1000,y:330,w:80,h:20}],special:{explosive:0,heavy:0}},
{id:6,balls:9,pirates:[{x:800,y:250},{x:900,y:250},{x:1000,y:250},{x:900,y:350}],structures:[{type:'wood',x:900,y:450,w:250,h:20},{type:'wood',x:800,y:380,w:20,h:100},{type:'wood',x:900,y:380,w:20,h:100},{type:'wood',x:1000,y:380,w:20,h:100},{type:'wood',x:850,y:330,w:80,h:20},{type:'wood',x:950,y:330,w:80,h:20},{type:'wood',x:800,y:280,w:80,h:20},{type:'wood',x:900,y:280,w:80,h:20},{type:'wood',x:1000,y:280,w:80,h:20}],special:{explosive:0,heavy:0}},
{id:7,balls:7,pirates:[{x:850,y:280},{x:950,y:280},{x:900,y:380}],structures:[{type:'wood',x:900,y:450,w:180,h:20},{type:'wood',x:830,y:400,w:20,h:80},{type:'wood',x:970,y:400,w:20,h:80},{type:'tnt',x:900,y:420,r:25},{type:'wood',x:850,y:330,w:80,h:20},{type:'wood',x:950,y:330,w:80,h:20},{type:'wood',x:900,y:310,w:80,h:20}],special:{explosive:1,heavy:0}},
{id:8,balls:8,pirates:[{x:800,y:250},{x:900,y:250},{x:1000,y:250}],structures:[{type:'stone',x:900,y:450,w:200,h:30},{type:'stone',x:800,y:380,w:30,h:100},{type:'stone',x:1000,y:380,w:30,h:100},{type:'wood',x:850,y:330,w:80,h:20},{type:'wood',x:950,y:330,w:80,h:20},{type:'wood',x:800,y:280,w:80,h:20},{type:'wood',x:900,y:280,w:80,h:20},{type:'wood',x:1000,y:280,w:80,h:20}],special:{explosive:1,heavy:1}},
{id:9,balls:9,pirates:[{x:850,y:200},{x:950,y:200},{x:900,y:300},{x:900,y:400}],structures:[{type:'wood',x:900,y:450,w:220,h:20},{type:'stone',x:850,y:380,w:30,h:100},{type:'stone',x:950,y:380,w:30,h:100},{type:'wood',x:900,y:350,w:150,h:20},{type:'wood',x:850,y:280,w:20,h:100},{type:'wood',x:950,y:280,w:20,h:100},{type:'wood',x:900,y:230,w:80,h:20},{type:'tnt',x:900,y:330,r:25}],special:{explosive:1,heavy:1}},
{id:10,balls:10,pirates:[{x:800,y:200},{x:900,y:200},{x:1000,y:200},{x:850,y:300},{x:950,y:300}],structures:[{type:'stone',x:900,y:450,w:250,h:30},{type:'stone',x:800,y:360,w:30,h:120},{type:'stone',x:1000,y:360,w:30,h:120},{type:'wood',x:850,y:330,w:80,h:20},{type:'wood',x:950,y:330,w:80,h:20},{type:'wood',x:800,y:250,w:80,h:20},{type:'wood',x:900,y:250,w:80,h:20},{type:'wood',x:1000,y:250,w:80,h:20},{type:'tnt',x:850,y:380,r:25},{type:'tnt',x:950,y:380,r:25}],special:{explosive:2,heavy:1}}
];

let engine,world,canvas,ctx,currentLevel=1,ballsLeft=0,score=0,gameState='menu',cannon=null,cannonballs=[],pirates=[],structures=[],isAiming=false,aimStartTime=0,power=0,mousePos={x:0,y:0},selectedBallType='normal',specialBalls={explosive:0,heavy:0},progress={unlockedLevels:1,levelStars:Array(15).fill(0),levelScores:Array(15).fill(0)};

function loadProgress(){try{const saved=localStorage.getItem('cannonClashProgress');if(saved)progress=JSON.parse(saved);}catch(e){}}
function saveProgress(){try{localStorage.setItem('cannonClashProgress',JSON.stringify(progress));}catch(e){}}

function showMainMenu(){
document.getElementById('menuScreen').style.display='block';
document.getElementById('levelScreen').style.display='none';
document.getElementById('rr').classList.remove('on');
}

function showLevelSelect(){
document.getElementById('menuScreen').style.display='none';
document.getElementById('levelScreen').style.display='block';
document.getElementById('rr').classList.remove('on');
renderLevelGrid();
}

function renderLevelGrid(){
const grid=document.getElementById('levelGrid');
grid.innerHTML='';
LEVELS.forEach((lvl,idx)=>{
const btn=document.createElement('button');
btn.className='level-btn';
btn.textContent=lvl.id;
if(lvl.id>progress.unlockedLevels){
btn.classList.add('locked');
btn.disabled=true;
}else{
btn.onclick=()=>startLevel(lvl.id);
const stars=progress.levelStars[idx]||0;
if(stars>0){
const starDiv=document.createElement('div');
starDiv.className='level-stars';
starDiv.textContent='★'.repeat(stars);
btn.appendChild(starDiv);
}
}
grid.appendChild(btn);
});
}

function startLevel(levelId){
currentLevel=levelId;
const lvl=LEVELS.find(l=>l.id===levelId);
if(!lvl)return;
ballsLeft=lvl.balls;
score=0;
specialBalls={...lvl.special};
selectedBallType='normal';
document.getElementById('blocker').classList.add('hidden');
document.getElementById('hud').classList.add('on');
document.getElementById('powerBar').classList.add('show');
document.getElementById('ballSelector').classList.add('show');
updateHUD();
updateBallSelector();
initGame(lvl);
gameState='playing';
}

function initGame(lvl){
if(engine)Matter.Engine.clear(engine);
engine=Matter.Engine.create();
world=engine.world;
world.gravity.y=1;
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
cannon={x:150,y:canvas.height-100,angle:0,length:60};
cannonballs=[];
pirates=[];
structures=[];
const ground=Matter.Bodies.rectangle(canvas.width/2,canvas.height-10,canvas.width,20,{isStatic:true,label:'ground'});
Matter.World.add(world,ground);
lvl.structures.forEach(s=>{
let body;
if(s.type==='tnt'){
body=Matter.Bodies.circle(s.x,s.y,s.r,{label:'tnt',restitution:0.3,friction:0.5,density:0.001});
}else{
const opts={isStatic:false,label:s.type,restitution:0.3,friction:0.5};
if(s.type==='stone')opts.density=0.003;
else opts.density=0.001;
body=Matter.Bodies.rectangle(s.x,s.y,s.w,s.h,opts);
}
structures.push(body);
Matter.World.add(world,body);
});
lvl.pirates.forEach(p=>{
const body=Matter.Bodies.circle(p.x,p.y,20,{label:'pirate',restitution:0.4,friction:0.3,density:0.0008});
pirates.push(body);
Matter.World.add(world,body);
});
Matter.Events.on(engine,'collisionStart',handleCollision);
Matter.Runner.run(engine);
}

function handleCollision(event){
event.pairs.forEach(pair=>{
const{bodyA,bodyB}=pair;
if((bodyA.label==='cannonball'||bodyB.label==='cannonball')&&(bodyA.label==='pirate'||bodyB.label==='pirate')){
const pirate=bodyA.label==='pirate'?bodyA:bodyB;
const ball=bodyA.label==='cannonball'?bodyA:bodyB;
if(ball.ballType==='explosive'){
explode(ball.position.x,ball.position.y);
}
removePirate(pirate);
score+=100;
updateHUD();
}
if((bodyA.label==='cannonball'||bodyB.label==='cannonball')&&(bodyA.label==='tnt'||bodyB.label==='tnt')){
const tnt=bodyA.label==='tnt'?bodyA:bodyB;
explode(tnt.position.x,tnt.position.y);
Matter.World.remove(world,tnt);
structures=structures.filter(s=>s!==tnt);
}
});
}

function explode(x,y){
const radius=150;
[...pirates,...structures,...cannonballs].forEach(body=>{
if(!body||!body.position)return;
const dx=body.position.x-x;
const dy=body.position.y-y;
const dist=Math.sqrt(dx*dx+dy*dy);
if(dist<radius){
const force=0.05*(1-dist/radius);
Matter.Body.applyForce(body,body.position,{x:dx/dist*force,y:dy/dist*force});
if(body.label==='pirate'){
removePirate(body);
score+=100;
updateHUD();
}
}
});
}

function removePirate(pirate){
Matter.World.remove(world,pirate);
pirates=pirates.filter(p=>p!==pirate);
if(pirates.length===0){
setTimeout(()=>endLevel(true),1000);
}
}

function updateHUD(){
document.getElementById('lv').textContent=currentLevel;
document.getElementById('bl').textContent=ballsLeft;
document.getElementById('sc').textContent=score;
}

function updateBallSelector(){
document.getElementById('explosiveCount').textContent=specialBalls.explosive;
document.getElementById('heavyCount').textContent=specialBalls.heavy;
document.querySelectorAll('.ball-type').forEach(btn=>{
const type=btn.dataset.type;
btn.classList.remove('selected','disabled');
if(type===selectedBallType)btn.classList.add('selected');
if(type==='explosive'&&specialBalls.explosive===0)btn.classList.add('disabled');
if(type==='heavy'&&specialBalls.heavy===0)btn.classList.add('disabled');
});
}

function endLevel(won){
gameState='ended';
document.getElementById('blocker').classList.remove('hidden');
document.getElementById('hud').classList.remove('on');
document.getElementById('powerBar').classList.remove('show');
document.getElementById('ballSelector').classList.remove('show');
document.getElementById('rr').classList.add('on');
document.getElementById('rs').textContent=score;
let stars=0;
if(won){
if(ballsLeft>=3)stars=3;
else if(ballsLeft>=1)stars=2;
else stars=1;
const idx=currentLevel-1;
if(stars>progress.levelStars[idx])progress.levelStars[idx]=stars;
if(score>progress.levelScores[idx])progress.levelScores[idx]=score;
if(currentLevel===progress.unlockedLevels&&currentLevel<LEVELS.length)progress.unlockedLevels++;
saveProgress();
}
document.getElementById('rst').textContent='★'.repeat(stars);
}

canvas=document.getElementById('gameCanvas');
ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

loadProgress();
renderLevelGrid();

canvas.addEventListener('mousedown',e=>{
if(gameState!=='playing'||ballsLeft<=0)return;
isAiming=true;
aimStartTime=Date.now();
mousePos={x:e.clientX,y:e.clientY};
});

canvas.addEventListener('mousemove',e=>{
mousePos={x:e.clientX,y:e.clientY};
if(isAiming){
const elapsed=Date.now()-aimStartTime;
power=Math.min(elapsed/1000,1);
document.getElementById('powerFill').style.height=(power*100)+'%';
}
});

canvas.addEventListener('mouseup',e=>{
if(!isAiming||gameState!=='playing')return;
isAiming=false;
document.getElementById('powerFill').style.height='0%';
const dx=mousePos.x-cannon.x;
const dy=mousePos.y-cannon.y;
const angle=Math.atan2(dy,dx);
const speed=10+power*20;
const vx=Math.cos(angle)*speed;
const vy=Math.sin(angle)*speed;
let radius=15;
let density=0.001;
if(selectedBallType==='heavy'){
radius=20;
density=0.003;
specialBalls.heavy--;
}else if(selectedBallType==='explosive'){
specialBalls.explosive--;
}
const ball=Matter.Bodies.circle(cannon.x+Math.cos(angle)*cannon.length,cannon.y+Math.sin(angle)*cannon.length,radius,{label:'cannonball',restitution:0.6,friction:0.1,density:density});
ball.ballType=selectedBallType;
Matter.Body.setVelocity(ball,{x:vx,y:vy});
cannonballs.push(ball);
Matter.World.add(world,ball);
ballsLeft--;
if(selectedBallType!=='normal')selectedBallType='normal';
updateHUD();
updateBallSelector();
if(ballsLeft===0&&pirates.length>0){
setTimeout(()=>endLevel(false),3000);
}
});

document.querySelectorAll('.ball-type').forEach(btn=>{
btn.addEventListener('click',()=>{
const type=btn.dataset.type;
if(type==='explosive'&&specialBalls.explosive>0)selectedBallType='explosive';
else if(type==='heavy'&&specialBalls.heavy>0)selectedBallType='heavy';
else selectedBallType='normal';
updateBallSelector();
});
});

function render(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#8B4513';
ctx.fillRect(0,canvas.height-20,canvas.width,20);
structures.forEach(body=>{
ctx.save();
ctx.translate(body.position.x,body.position.y);
ctx.rotate(body.angle);
if(body.label==='tnt'){
ctx.fillStyle='#FF4444';
ctx.beginPath();
ctx.arc(0,0,body.circleRadius,0,Math.PI*2);
ctx.fill();
ctx.fillStyle='#000';
ctx.font='bold 16px Arial';
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText('TNT',0,0);
}else{
if(body.label==='stone')ctx.fillStyle='#7F8C8D';
else ctx.fillStyle='#D2691E';
const verts=body.vertices;
ctx.beginPath();
ctx.moveTo(verts[0].x-body.position.x,verts[0].y-body.position.y);
for(let i=1;i<verts.length;i++){
ctx.lineTo(verts[i].x-body.position.x,verts[i].y-body.position.y);
}
ctx.closePath();
ctx.fill();
ctx.strokeStyle='#000';
ctx.lineWidth=2;
ctx.stroke();
}
ctx.restore();
});
pirates.forEach(body=>{
ctx.save();
ctx.translate(body.position.x,body.position.y);
ctx.fillStyle='#FF6B6B';
ctx.beginPath();
ctx.arc(0,0,20,0,Math.PI*2);
ctx.fill();
ctx.fillStyle='#000';
ctx.beginPath();
ctx.arc(-7,-5,3,0,Math.PI*2);
ctx.arc(7,-5,3,0,Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.arc(0,5,8,0,Math.PI);
ctx.stroke();
ctx.restore();
});
cannonballs.forEach(body=>{
ctx.save();
ctx.translate(body.position.x,body.position.y);
if(body.ballType==='explosive')ctx.fillStyle='#FF4444';
else if(body.ballType==='heavy')ctx.fillStyle='#505050';
else ctx.fillStyle='#1A1A1A';
ctx.beginPath();
ctx.arc(0,0,body.circleRadius,0,Math.PI*2);
ctx.fill();
ctx.strokeStyle='#000';
ctx.lineWidth=2;
ctx.stroke();
ctx.restore();
});
ctx.save();
ctx.translate(cannon.x,cannon.y);
const dx=mousePos.x-cannon.x;
const dy=mousePos.y-cannon.y;
cannon.angle=Math.atan2(dy,dx);
ctx.rotate(cannon.angle);
ctx.fillStyle='#2C3E50';
ctx.fillRect(0,-15,cannon.length,30);
ctx.fillStyle='#34495E';
ctx.beginPath();
ctx.arc(0,0,25,0,Math.PI*2);
ctx.fill();
ctx.strokeStyle='#000';
ctx.lineWidth=3;
ctx.stroke();
ctx.restore();
requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
