<html lang="en">
<head>

<title>Truck Jump</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',Arial,sans-serif}
canvas{display:block}
#ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#score-display{position:absolute;top:15px;left:50%;transform:translateX(-50%);color:#fff;font-size:24px;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,.8);letter-spacing:2px}
#level-display{position:absolute;top:45px;left:50%;transform:translateX(-50%);color:#aaddff;font-size:16px;text-shadow:0 1px 3px rgba(0,0,0,.8)}

#menu-screen h1{font-size:64px;color:#ff6600;margin-bottom:8px;text-shadow:0 0 20px rgba(255,102,0,.6);letter-spacing:3px}

.menu-btn{background:linear-gradient(135deg,#ff6600,#cc4400);border:none;color:#fff;font-size:18px;padding:12px 40px;border-radius:8px;cursor:pointer;pointer-events:all;transition:all .2s;letter-spacing:1px;min-width:260px}

#level-select{display:none;flex-direction:column;align-items:center;gap:8px;margin-bottom:16px;max-height:280px;overflow-y:auto;padding:8px}
.level-item{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 24px;color:#fff;font-size:15px;cursor:pointer;pointer-events:all;transition:all .2s;min-width:240px;text-align:center}
.level-item:hover{background:rgba(255,102,0,.15);border-color:#ff6600;transform:scale(1.03)}

.level-item.completed{border-color:#44ff88}
.level-item .stars{color:#ffcc00;margin-left:6px}

</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';
import { VignetteShader } from 'three/addons/shaders/VignetteShader.js';

// ===================== CONFIG =====================
const TRUCK_COLORS = [
  0xe83030, 0x2878e8, 0x28c848, 0xe8c828, 0xe87828,
  0xb838e8, 0x28c8c8, 0xe84888, 0x48e888, 0xe8a848
];
const TRUCK_W = 3.0;
const TRUCK_H = 2.4;
const TRUCK_LENS = [8, 10, 12];
const GRAVITY = -30;
const JUMP_FORCE = 14;
const MOVE_SPEED = 8;
const DASH_FORCE = 15;
const LANE_W = 0;

const LEVELS = [
  { name:'Разминка', trucks:10, speed:8,  gap:5,  lanes:1, desc:'Одна линия. Просто прыгай вперёд!' },
  { name:'Двойной ряд', trucks:12, speed:8,  gap:5,  lanes:2, desc:'Две полосы. Выбирай путь!' },
  { name:'Зигзаг', trucks:14, speed:9,  gap:5,  lanes:3, desc:'Три полосы. Не промахнись!' },
  { name:'Быстрее!', trucks:15, speed:10, gap:5,  lanes:3, desc:'Грузовики быстрее!' },
  { name:'Хаос', trucks:16, speed:11, gap:4,  lanes:3, desc:'Меньше места для ошибки!' },
  { name:'Молния', trucks:18, speed:12, gap:4,  lanes:3, desc:'Ещё быстрее!' },
  { name:'Безумие', trucks:20, speed:13, gap:4,  lanes:3, desc:'Держись!' },
  { name:'Финал', trucks:22, speed:14, gap:3,  lanes:3, desc:'Почти невозможно!' },
  { name:'Невозможное', trucks:25, speed:15, gap:3,  lanes:3, desc:'Удачи...' },
  { name:'Бог', trucks:30, speed:16, gap:3,  lanes:3, desc:'Только для мастеров!' },
];

// ===================== STATE =====================
let scene, camera, renderer, controls, clock;
let composer, bloomPass, vignettePass;
let playerBody, playerVelocity, onGround;
let trucks = [];
let particles = [];
let lavaMesh;
let audio;
let keys = {};
let comboCount = 0, comboTimer = 0;
let dashCooldown = 0;
let gameMode = 'endless';
let currentLevel = 0;
let score = 0;
let bestScore = parseInt(localStorage.getItem('tjBest') || '0');
let levelJumped = 0, levelTotal = 0;
let gameActive = false;
let currentTruck = null;
let trucksSpawned = 0;

// ===================== INIT =====================
function init() {
  clock = new THREE.Clock();

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x3a5a7a);
  scene.fog = new THREE.FogExp2(0x3a5a7a, 0.006);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  controls = new PointerLockControls(camera, document.body);
  controls.addEventListener('lock', () => {
    document.getElementById('hint-text').style.display = 'none';
  });
  controls.addEventListener('unlock', () => {
    if (gameActive) document.getElementById('hint-text').style.display = 'block';
    else document.getElementById('hint-text').style.display = 'none';
  });

  setupLighting();
  setupPostProcessing();
  createEnvironment();
  audio = new AudioEngine();
  setupControls();
  buildLevelSelect();
  animate();
}

function setupLighting() {
  scene.add(new THREE.HemisphereLight(0x88aacc, 0x443322, 0.6));
  scene.add(new THREE.AmbientLight(0x556677, 0.7));

  const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
  sun.position.set(15, 40, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 100;
  sun.shadow.camera.left = -40;
  sun.shadow.camera.right = 40;
  sun.shadow.camera.top = 40;
  sun.shadow.camera.bottom = -40;
  sun.shadow.bias = -0.0001;
  scene.add(sun);

  const lavaGlow = new THREE.PointLight(0xff4400, 2, 50);
  lavaGlow.position.set(0, -8, -30);
  scene.add(lavaGlow);
}

function setupPostProcessing() {
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));

  bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.3, 0.85
  );
  composer.addPass(bloomPass);

  vignettePass = new ShaderPass(VignetteShader);
  vignettePass.uniforms['offset'].value = 1.2;
  vignettePass.uniforms['darkness'].value = 0.8;
  composer.addPass(vignettePass);

  const fxaa = new ShaderPass(FXAAShader);
  fxaa.material.uniforms['resolution'].value.set(
    1/(window.innerWidth*renderer.getPixelRatio()),
    1/(window.innerHeight*renderer.getPixelRatio())
  );
  composer.addPass(fxaa);
}

function createEnvironment() {
  // Лава - приглушённая
  const lavaGeo = new THREE.PlaneGeometry(300, 1000, 32, 32);
  const lavaMat = new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 },
      lavaColor1: { value: new THREE.Color(0x881100) },
      lavaColor2: { value: new THREE.Color(0xcc4400) },
      lavaColor3: { value: new THREE.Color(0xff8800) },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float time;
      uniform vec3 lavaColor1;
      uniform vec3 lavaColor2;
      uniform vec3 lavaColor3;
      varying vec2 vUv;
      float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
      float noise(vec2 p){
        vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);
        return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
      }
      float fbm(vec2 p){
        float v=0.0,a=0.5;mat2 r=mat2(.8,.6,-.6,.8);
        for(int i=0;i<4;i++){v+=a*noise(p);p=r*p*2.0;a*=.5;}return v;
      }
      void main(){
        vec2 uv=vUv*15.0;float t=time*0.2;
        float n=(fbm(uv+vec2(t,t*.5))+fbm(uv*1.5+vec2(-t*.7,t*.8)))*.5;
        vec3 col=mix(lavaColor1,lavaColor2,smoothstep(.3,.6,n));
        col=mix(col,lavaColor3,smoothstep(.65,.85,n)*.5);
        col+=vec3(1,.4,.1)*pow(n,3.0)*1.5;
        float d=length(vUv-.5)*2.0;col*=1.0-d*.2;
        gl_FragColor=vec4(col,1.0);
      }
    `,
  });
  lavaMesh = new THREE.Mesh(lavaGeo, lavaMat);
  lavaMesh.rotation.x = -Math.PI / 2;
  lavaMesh.position.y = -8;
  lavaMesh.position.z = -200;
  scene.add(lavaMesh);

  // Облака
  for (let i = 0; i < 30; i++) {
    const cloudGeo = new THREE.SphereGeometry(5 + Math.random() * 10, 8, 6);
    const cloudMat = new THREE.MeshStandardMaterial({
      color: 0xffffff, transparent: true, opacity: 0.3, roughness: 1
    });
    const cloud = new THREE.Mesh(cloudGeo, cloudMat);
    cloud.position.set(
      (Math.random() - 0.5) * 200,
      30 + Math.random() * 40,
      (Math.random() - 0.5) * 400
    );
    cloud.scale.set(1 + Math.random(), 0.3 + Math.random() * 0.3, 1 + Math.random());
    scene.add(cloud);
  }

  // Далекие здания/горы
  for (let i = 0; i < 40; i++) {
    const h = 5 + Math.random() * 25;
    const bGeo = new THREE.BoxGeometry(3 + Math.random() * 8, h, 3 + Math.random() * 8);
    const bMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.6, 0.1, 0.15 + Math.random() * 0.1),
      roughness: 0.9
    });
    const b = new THREE.Mesh(bGeo, bMat);
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 80;
    b.position.set(Math.cos(angle) * dist, h / 2 - 8, Math.sin(angle) * dist - 100);
    scene.add(b);
  }
}

// ===================== TRUCK CREATION =====================
function createTruck(x, z, length, speed, color) {
  const group = new THREE.Group();

  // Яркий корпус
  const bodyGeo = new THREE.BoxGeometry(TRUCK_W, TRUCK_H, length);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: color, roughness: 0.4, metalness: 0.5
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = TRUCK_H / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Белая полоса
  const stripeGeo = new THREE.BoxGeometry(TRUCK_W + 0.02, 0.1, length + 0.02);
  const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.3, transparent: true, opacity: 0.25 });
  const stripe = new THREE.Mesh(stripeGeo, stripeMat);
  stripe.position.y = TRUCK_H * 0.5;
  group.add(stripe);

  // Кабина
  const cabGeo = new THREE.BoxGeometry(TRUCK_W - 0.3, TRUCK_H * 0.6, 2.2);
  const cabMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3, metalness: 0.7 });
  const cab = new THREE.Mesh(cabGeo, cabMat);
  cab.position.set(0, TRUCK_H + 0.3, length / 2 - 1.1);
  cab.castShadow = true;
  group.add(cab);

  // Стекло
  const wsGeo = new THREE.PlaneGeometry(TRUCK_W - 0.7, 0.8);
  const wsMat = new THREE.MeshStandardMaterial({
    color: 0x88bbdd, emissive: 0x224466, emissiveIntensity: 0.2,
    roughness: 0.05, metalness: 0.9, transparent: true, opacity: 0.5
  });
  const ws = new THREE.Mesh(wsGeo, wsMat);
  ws.position.set(0, TRUCK_H + 0.45, length / 2 - 0.01);
  group.add(ws);

  // Колёса
  const whGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.3, 12);
  const whMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
  [[-TRUCK_W/2-.15,.5,length/2-2.5],[TRUCK_W/2+.15,.5,length/2-2.5],
   [-TRUCK_W/2-.15,.5,-length/2+2.5],[TRUCK_W/2+.15,.5,-length/2+2.5]].forEach(p => {
    const w = new THREE.Mesh(whGeo, whMat);
    w.rotation.z = Math.PI / 2;
    w.position.set(...p);
    group.add(w);
  });

  // Фары
  const hlGeo = new THREE.SphereGeometry(0.15, 6, 6);
  const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffaa, emissiveIntensity: 1 });
  [-1,1].forEach(s => {
    const hl = new THREE.Mesh(hlGeo, hlMat);
    hl.position.set(s*(TRUCK_W/2-.4), TRUCK_H*.5, length/2+.05);
    group.add(hl);
  });

  group.position.set(x, 0, z);
  scene.add(group);

  return { mesh: group, speed, length, width: TRUCK_W, height: TRUCK_H, color, jumped: false };
}

// ===================== PLAYER =====================
function createPlayer() {
  // Невидимое тело для коллизий и тени
  const group = new THREE.Group();
  const bodyGeo = new THREE.CapsuleGeometry(0.3, 0.6, 4, 8);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x00ff88, emissive: 0x00aa44, emissiveIntensity: 0.3,
    roughness: 0.3, metalness: 0.5
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);
  scene.add(group);
  return group;
}

// ===================== PARTICLES =====================
function createParticles(pos, color, count) {
  for (let i = 0; i < count; i++) {
    const g = new THREE.SphereGeometry(0.06 + Math.random() * 0.06, 4, 4);
    const m = new THREE.MeshBasicMaterial({ color });
    const p = new THREE.Mesh(g, m);
    p.position.copy(pos);
    scene.add(p);
    particles.push({
      mesh: p,
      vel: new THREE.Vector3((Math.random()-.5)*10, Math.random()*6+2, (Math.random()-.5)*10),
      life: 1, decay: 1.5 + Math.random()
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vel.y -= 15 * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.life -= p.decay * dt;
    p.mesh.material.opacity = Math.max(0, p.life);
    p.mesh.material.transparent = true;
    p.mesh.scale.setScalar(p.life);
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }
}

function clearScene() {
  trucks.forEach(t => scene.remove(t.mesh));
  trucks = [];
  particles.forEach(p => scene.remove(p.mesh));
  particles = [];
  if (playerBody) scene.remove(playerBody);
  currentTruck = null;
}

// ===================== GAME START =====================
function startEndless() {
  gameMode = 'endless';
  hideAllScreens();
  clearScene();

  playerBody = createPlayer();
  playerVelocity = new THREE.Vector3(0, 0, 0);
  onGround = true;
  score = 0;
  comboCount = 0; comboTimer = 0;
  dashCooldown = 0;
  trucksSpawned = 0;
  gameActive = true;

  // Строим цепочку грузовиков вперёд (-Z)
  let z = -5;
  for (let i = 0; i < 15; i++) {
    const lane = Math.floor(Math.random() * 3) - 1;
    const x = lane * LANE_W;
    const len = TRUCK_LENS[Math.floor(Math.random() * TRUCK_LENS.length)];
    const col = TRUCK_COLORS[Math.floor(Math.random() * TRUCK_COLORS.length)];
    const spd = 6 + Math.random() * 6;
    const truck = createTruck(x, z, len, spd, col);
    trucks.push(truck);
    z -= len / 2 + 4 + Math.random() * 4 + len / 2;
    trucksSpawned++;
  }

  // Ставим игрока на первый грузовик
  const first = trucks[0];
  playerBody.position.set(first.mesh.position.x, first.mesh.position.y + first.height + 0.4, first.mesh.position.z);
  currentTruck = first;

  document.getElementById('level-display').textContent = 'БЕСКОНЕЧНЫЙ';
  document.getElementById('progress-display').textContent = '';

  audio.init();
  setTimeout(() => { if (gameActive) controls.lock(); }, 100);
}

function startLevel(idx) {
  gameMode = 'level';
  currentLevel = idx;
  const lv = LEVELS[idx];
  hideAllScreens();
  clearScene();

  playerBody = createPlayer();
  playerVelocity = new THREE.Vector3(0, 0, 0);
  onGround = true;
  score = 0;
  comboCount = 0; comboTimer = 0;
  dashCooldown = 0;
  levelJumped = 0;
  levelTotal = lv.trucks;
  trucksSpawned = 0;
  gameActive = true;

  // Строим уровень
  let z = -5;
  for (let i = 0; i < lv.trucks; i++) {
    const lane = lv.lanes === 1 ? 0 : (Math.floor(Math.random() * lv.lanes) - Math.floor(lv.lanes / 2));
    const x = lane * LANE_W;
    const len = TRUCK_LENS[Math.floor(Math.random() * TRUCK_LENS.length)];
    const col = TRUCK_COLORS[Math.floor(Math.random() * TRUCK_COLORS.length)];
    const spd = lv.speed * (0.85 + Math.random() * 0.3);
    const truck = createTruck(x, z, len, spd, col);
    trucks.push(truck);
    z -= len / 2 + lv.gap + len / 2;
    trucksSpawned++;
  }

  const first = trucks[0];
  playerBody.position.set(first.mesh.position.x, first.mesh.position.y + first.height + 0.4, first.mesh.position.z);
  currentTruck = first;

  document.getElementById('level-display').textContent = `Уровень ${idx+1}: ${lv.name}`;
  document.getElementById('progress-display').textContent = `0 / ${lv.trucks}`;

  audio.init();
  setTimeout(() => { if (gameActive) controls.lock(); }, 100);
}

function hideAllScreens() {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('level-complete-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'none';
}

function die() {
  gameActive = false;
  audio.playDeathSound();
  controls.unlock();

  const fs = Math.floor(score);
  if (fs > bestScore) { bestScore = fs; localStorage.setItem('tjBest', fs.toString()); }

  document.getElementById('final-score-value').textContent = fs;
  document.getElementById('best-score-value').textContent = bestScore;
  document.getElementById('death-screen').style.display = 'flex';

  createParticles(playerBody.position, 0xff4444, 30);
}

function completeLevel() {
  gameActive = false;
  controls.unlock();

  const stars = levelJumped >= levelTotal ? 3 : levelJumped >= levelTotal * 0.7 ? 2 : 1;
  const done = JSON.parse(localStorage.getItem('tjLevels') || '{}');
  done[currentLevel] = Math.max(done[currentLevel] || 0, stars);
  localStorage.setItem('tjLevels', JSON.stringify(done));

  document.getElementById('level-complete-info').textContent = `Грузовиков: ${levelJumped} / ${levelTotal}`;
  document.getElementById('level-complete-stars').textContent = '\u2B50'.repeat(stars) + '\u2606'.repeat(3-stars);

  if (currentLevel < LEVELS.length - 1) {
    document.getElementById('btn-next-level').style.display = 'block';
    document.getElementById('btn-next-level').onclick = () => startLevel(currentLevel + 1);
  } else {
    document.getElementById('btn-next-level').style.display = 'none';
  }
  document.getElementById('level-complete-screen').style.display = 'flex';
}

function goToMenu() {
  hideAllScreens();
  document.getElementById('menu-screen').style.display = 'flex';
  clearScene();
  gameActive = false;
}

// ===================== CONTROLS =====================
function setupControls() {
  document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') e.preventDefault(); });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  document.getElementById('btn-endless').onclick = startEndless;
  document.getElementById('btn-levels').onclick = () => {
    const ls = document.getElementById('level-select');
    ls.style.display = ls.style.display === 'flex' ? 'none' : 'flex';
    buildLevelSelect();
  };
  document.getElementById('btn-restart').onclick = () => {
    document.getElementById('death-screen').style.display = 'none';
    if (gameMode === 'level') startLevel(currentLevel); else startEndless();
  };
  document.getElementById('btn-menu').onclick = goToMenu;
  document.getElementById('btn-menu2').onclick = goToMenu;

  document.getElementById('music-toggle').onclick = e => {
    e.stopPropagation();
    const m = audio.toggleMute();
    document.getElementById('music-toggle').textContent = m ? '\uD83D\uDD07' : '\uD83D\uDD0A';
  };

  renderer.domElement.onclick = () => { if (gameActive && !controls.isLocked) controls.lock(); };

  window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  };
}

function buildLevelSelect() {
  const ls = document.getElementById('level-select');
  const done = JSON.parse(localStorage.getItem('tjLevels') || '{}');
  ls.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const d = document.createElement('div');
    d.className = 'level-item';
    const s = done[i] || 0;
    const unlocked = i === 0 || (done[i-1] || 0) > 0;
    if (!unlocked) d.classList.add('locked');
    if (s > 0) d.classList.add('completed');
    d.innerHTML = `${i+1}. ${lv.name} <span class="stars">${'\u2B50'.repeat(s)}${'\u2606'.repeat(3-s)}</span>`;
    if (unlocked) d.onclick = () => startLevel(i);
    ls.appendChild(d);
  });
}

// ===================== COLLISION =====================
function checkLanding() {
  const pp = playerBody.position;
  const pr = 0.4;

  for (const t of trucks) {
    const tp = t.mesh.position;
    const hl = t.length / 2;
    const hw = t.width / 2;

    if (Math.abs(pp.x - tp.x) < hw + pr && Math.abs(pp.z - tp.z) < hl + pr) {
      const top = tp.y + t.height;
      const pb = pp.y - 0.3;
      if (pb >= top - 0.5 && pb <= top + 0.6 && playerVelocity.y <= 0.5) {
        return { truck: t, top };
      }
    }
  }
  return null;
}

// ===================== MAIN LOOP =====================
function update() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.getElapsedTime();

  if (!gameActive) {
    updateParticles(dt);
    composer.render();
    return;
  }

  score += dt * 10;
  document.getElementById('score-display').textContent = Math.floor(score);

  if (gameMode === 'level') {
    document.getElementById('progress-display').textContent = `${levelJumped} / ${levelTotal}`;
  }

  // Направление от камеры (FPS)
  const fwd = new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y = 0;
  fwd.normalize();
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();

  const moveDir = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(fwd);
  if (keys['KeyS'] || keys['ArrowDown']) moveDir.sub(fwd);
  if (keys['KeyA'] || keys['ArrowLeft']) moveDir.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(right);
  if (moveDir.length() > 0) moveDir.normalize();

  // Прыжок
  if (keys['Space']) {
    if (onGround) {
      playerVelocity.y = JUMP_FORCE;
      onGround = false;
      currentTruck = null;
      audio.playJumpSound();
      createParticles(playerBody.position, 0x00ff88, 5);
      keys['Space'] = false;
    }
  }

  // Dash
  dashCooldown = Math.max(0, dashCooldown - dt);
  if (keys['ShiftLeft'] && dashCooldown <= 0) {
    const dd = moveDir.length() > 0 ? moveDir.clone() : fwd.clone();
    playerVelocity.add(dd.multiplyScalar(DASH_FORCE));
    dashCooldown = 1.0;
    audio.playDashSound();
    createParticles(playerBody.position, 0xffcc00, 8);
    keys['ShiftLeft'] = false;
  }

  // Физика
  playerVelocity.x = moveDir.x * MOVE_SPEED;
  playerVelocity.z = moveDir.z * MOVE_SPEED;
  playerVelocity.y += GRAVITY * dt;

  // Инерция от грузовика (Clustertruck style)
  if (onGround && currentTruck) {
    playerVelocity.z -= currentTruck.speed;
  }

  playerBody.position.add(playerVelocity.clone().multiplyScalar(dt));

  // Поворот
  if (moveDir.length() > 0) {
    playerBody.rotation.y = THREE.MathUtils.lerp(playerBody.rotation.y, Math.atan2(moveDir.x, moveDir.z), 0.15);
  }

  // Приземление
  const col = checkLanding();
  if (col) {
    if (!onGround && playerVelocity.y < 0) {
      if (!col.truck.jumped) {
        col.truck.jumped = true;
        levelJumped++;
      }
      comboCount++;
      comboTimer = 2;
      audio.playLandSound();
      createParticles(playerBody.position, col.truck.color, 6);

      if (comboCount >= 2) {
        const el = document.getElementById('combo-display');
        el.textContent = `COMBO x${comboCount}!`;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 800);
        score += comboCount * 50;
      }

      if (gameMode === 'level' && levelJumped >= levelTotal) {
        setTimeout(() => completeLevel(), 400);
      }
    }
    playerBody.position.y = col.top + 0.3;
    playerVelocity.y = 0;
    onGround = true;
    currentTruck = col.truck;
  } else {
    onGround = false;
    if (playerVelocity.y > 0) comboCount = 0;
  }

  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) comboCount = 0; }

  // Двигаем грузовики ВПЕРЁД (-Z)
  for (let i = trucks.length - 1; i >= 0; i--) {
    const t = trucks[i];
    t.mesh.position.z -= t.speed * dt;

    if (t.mesh.position.z < playerBody.position.z - 80) {
      scene.remove(t.mesh);
      trucks.splice(i, 1);
      if (currentTruck === t) currentTruck = null;
    }
  }

  // Спавн новых в endless
  if (gameMode === 'endless') {
    let minZ = 0;
    for (const t of trucks) { if (t.mesh.position.z < minZ) minZ = t.mesh.position.z; }
    if (minZ > playerBody.position.z - 150) {
      const lane = Math.floor(Math.random() * 3) - 1;
      const len = TRUCK_LENS[Math.floor(Math.random() * TRUCK_LENS.length)];
      const col2 = TRUCK_COLORS[Math.floor(Math.random() * TRUCK_COLORS.length)];
      const spd = 6 + Math.random() * 6;
      const z = minZ - len / 2 - 4 - Math.random() * 6;
      const truck = createTruck(lane * LANE_W, z, len, spd, col2);
      trucks.push(truck);
      trucksSpawned++;
    }
  }

  // Смерть
  if (playerBody.position.y < -6) { die(); return; }

  // Камера от первого лица
  controls.getObject().position.set(
    playerBody.position.x,
    playerBody.position.y + 1.6,
    playerBody.position.z
  );

  // Лава
  if (lavaMesh) lavaMesh.material.uniforms.time.value = elapsed;

  updateParticles(dt);
  composer.render();
}

function animate() {
  requestAnimationFrame(animate);
  update();
}

// ===================== AUDIO =====================
class AudioEngine {
  constructor() {
    this.ctx = null; this.muted = false;
    this.bpm = 138; this.beatInterval = 60 / this.bpm;
    this.nextBeatTime = 0; this.beatCount = 0;
    this.bass = [55, 55, 73.42, 65.41, 55, 82.41, 73.42, 55];
    this.melody = [220, 261.63, 293.66, 329.63, 293.66, 261.63, 220, 349.23];
    this.arp = [440, 523.25, 587.33, 659.25, 783.99, 659.25, 587.33, 523.25];
  }
  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.3;
    this.comp = this.ctx.createDynamicsCompressor();
    this.comp.threshold.value = -20; this.comp.ratio.value = 8;
    this.master.connect(this.comp); this.comp.connect(this.ctx.destination);
    this.nextBeatTime = this.ctx.currentTime + 0.1;
    this.schedule();
  }
  schedule() {
    while (this.nextBeatTime < this.ctx.currentTime + 0.3) {
      this.playBeat(this.nextBeatTime, this.beatCount);
      this.nextBeatTime += this.beatInterval; this.beatCount++;
    }
    requestAnimationFrame(() => this.schedule());
  }
  playBeat(time, beat) {
    if (this.muted) return;
    const bp = beat % 8, sp = beat % 16;
    if (sp===0||sp===4||sp===8||sp===12) this.kick(time, sp%8===0?.8:.5);
    if (bp===2||bp===6) this.snare(time);
    this.hihat(time, sp%2===0?.1:.05);
    if (sp%2===0) this.bassNote(time, this.bass[bp]);
    if (bp%2===0) this.melNote(time, this.melody[bp]);
    if (sp%4===0) this.arpNote(time, this.arp[sp%8]);
  }
  kick(t,v){const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(35,t+.12);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g);g.connect(this.master);o.start(t);o.stop(t+.2);}
  snare(t){const b=this.ctx.createBuffer(1,this.ctx.sampleRate*.1,this.ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const n=this.ctx.createBufferSource();n.buffer=b;const g=this.ctx.createGain();g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);const f=this.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=1000;n.connect(f);f.connect(g);g.connect(this.master);n.start(t);n.stop(t+.1);}
  hihat(t,v){const b=this.ctx.createBuffer(1,this.ctx.sampleRate*.03,this.ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const n=this.ctx.createBufferSource();n.buffer=b;const g=this.ctx.createGain();g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.03);const f=this.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=7000;n.connect(f);f.connect(g);g.connect(this.master);n.start(t);n.stop(t+.03);}
  bassNote(t,f){const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+this.beatInterval*.8);const fl=this.ctx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=300;o.connect(fl);fl.connect(g);g.connect(this.master);o.start(t);o.stop(t+this.beatInterval);}
  melNote(t,f){const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+this.beatInterval*.7);const fl=this.ctx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=1500;o.connect(fl);fl.connect(g);g.connect(this.master);o.start(t);o.stop(t+this.beatInterval);}
  arpNote(t,f){const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.03,t);g.gain.exponentialRampToValueAtTime(.001,t+this.beatInterval*.4);o.connect(g);g.connect(this.master);o.start(t);o.stop(t+this.beatInterval*.5);}
  playJumpSound(){if(!this.ctx||this.muted)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(250,this.ctx.currentTime);o.frequency.exponentialRampToValueAtTime(500,this.ctx.currentTime+.1);g.gain.setValueAtTime(.12,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+.12);o.connect(g);g.connect(this.master);o.start();o.stop(this.ctx.currentTime+.12);}
  playLandSound(){if(!this.ctx||this.muted)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(180,this.ctx.currentTime);o.frequency.exponentialRampToValueAtTime(60,this.ctx.currentTime+.1);g.gain.setValueAtTime(.2,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+.15);o.connect(g);g.connect(this.master);o.start();o.stop(this.ctx.currentTime+.15);}
  playDeathSound(){if(!this.ctx||this.muted)return;for(let i=0;i<5;i++){const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(400-i*60,this.ctx.currentTime+i*.08);g.gain.setValueAtTime(.12,this.ctx.currentTime+i*.08);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+i*.08+.15);o.connect(g);g.connect(this.master);o.start(this.ctx.currentTime+i*.08);o.stop(this.ctx.currentTime+i*.08+.15);}}
  playDashSound(){if(!this.ctx||this.muted)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(400,this.ctx.currentTime);o.frequency.exponentialRampToValueAtTime(800,this.ctx.currentTime+.12);g.gain.setValueAtTime(.1,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+.15);o.connect(g);g.connect(this.master);o.start();o.stop(this.ctx.currentTime+.15);}
  toggleMute(){this.muted=!this.muted;if(this.master)this.master.gain.value=this.muted?0:.3;return this.muted;}
  setSpeed(m){this.bpm=138*Math.min(m,2.5);this.beatInterval=60/this.bpm;}
}

init();
</script>
