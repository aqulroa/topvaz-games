<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стрелялки игры - aqulroa Games</title>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
<meta name="description" content="67 бесплатных HTML5 игр">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/game-new.css">
<style>
.main-content {
  position: relative;
  z-index: 10;
  max-width: 1400px;
  margin: 0 auto;
  padding: 100px 32px 60px;
}

.page-title {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 40px;
  background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  animation: fadeUp 0.5s ease backwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.game-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: var(--accent);
  box-shadow: 0 20px 50px rgba(168, 85, 247, 0.25);
}

.game-thumb {
  aspect-ratio: 16/10;
  overflow: hidden;
  background: var(--bg-secondary);
}

.game-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.game-card:hover .game-thumb img {
  transform: scale(1.1);
}

.game-info {
  padding: 16px;
}

.game-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
}

.back-home {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 40px;
  padding: 12px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  text-decoration: none;
  font-weight: 500;
  transition: all 0.25s ease;
}

.back-home:hover {
  background: var(--accent);
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
  color: #fff;
}

.back-home svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
}

@media (max-width: 768px) {
  .main-content { padding: 80px 16px 40px; }
  .games-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
}
</style>
</head>
<body>

<div class="bg-container">
  <div class="bg-grid"></div>
  <div class="cube cube-1"><div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face left"></div><div class="cube-face right"></div><div class="cube-face top"></div><div class="cube-face bottom"></div></div>
  <div class="cube cube-2"><div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face left"></div><div class="cube-face right"></div><div class="cube-face top"></div><div class="cube-face bottom"></div></div>
  <div class="cube cube-3"><div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face left"></div><div class="cube-face right"></div><div class="cube-face top"></div><div class="cube-face bottom"></div></div>
  <div class="cube cube-4"><div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face left"></div><div class="cube-face right"></div><div class="cube-face top"></div><div class="cube-face bottom"></div></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="bg-particles"></div>

<main class="main-content">
  <h1 class="page-title">Стрелялки игры</h1>
  <div class="games-grid">
    <a class="game-card" href="play/rooftop-snipers.html"><div class="game-thumb"><img src="images/rooftop-snipers.webp" alt="Rooftop Snipers"></div><div class="game-info"><div class="game-title">Rooftop Snipers</div></div></a>
    <a class="game-card" href="play/archery-world-tour.html"><div class="game-thumb"><img src="images/archery-world-tour.webp" alt="Archery World Tour"></div><div class="game-info"><div class="game-title">Archery World Tour</div></div></a>
    <a class="game-card" href="play/drunken-duel.html"><div class="game-thumb"><img src="images/drunken-duel.webp" alt="Drunken Duel"></div><div class="game-info"><div class="game-title">Drunken Duel</div></div></a>
    <a class="game-card" href="play/jet-boy.html"><div class="game-thumb"><img src="images/jet-boy.svg" alt="Jet Boy"></div><div class="game-info"><div class="game-title">Jet Boy</div></div></a>
    <a class="game-card" href="play/aim-trainer.html"><div class="game-thumb"><img src="images/aim-trainer.svg" alt="Aim Trainer"></div><div class="game-info"><div class="game-title">Aim Trainer</div></div></a>
    <a class="game-card" href="play/dead-shot.html"><div class="game-thumb"><img src="images/dead-shot.png" alt="Dead Shot"></div><div class="game-info"><div class="game-title">Dead Shot</div></div></a>
  </div>
  <a href="index.html" class="back-home">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Все игры
  </a>
</main>

</body>
</html>
