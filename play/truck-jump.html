<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clustertruck Web Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); mix-blend-mode: difference; }
        
        .screen { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(5,5,10,0.85); backdrop-filter: blur(8px); pointer-events: auto; }
        .hidden { display: none !important; }
        
        h1 { font-size: 72px; color: #ff3333; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,50,50,0.6); }
        .subtitle { color: #aaa; font-size: 20px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 800px; padding: 20px; }
        button { background: rgba(255,255,255,0.05); border: 2px solid #555; color: white; padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: all 0.2s ease; backdrop-filter: blur(4px); }
        button:hover { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.5); transform: scale(1.05); }
        button.primary { border-color: #ff3333; color: #ff3333; background: rgba(255,50,50,0.1); }
        button.primary:hover { border-color: #ff3333; background: #ff3333; color: white; box-shadow: 0 0 30px rgba(255,50,50,0.8); }
        
        #hud { position: absolute; top: 20px; left: 20px; font-size: 24px; color: white; font-weight: bold; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
        #center-msg { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); font-size: 54px; font-weight: 900; color: white; background: rgba(0,30,50,0.6); padding: 5px 30px; border-left: 10px solid white; border-right: 10px solid white; text-transform: uppercase; font-family: 'Arial Black', sans-serif; opacity: 1; transition: opacity 0.3s; z-index: 10; }
        
        .controls-hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 14px; }
        .controls-hint b { color: #ff9900; }

        #win-screen h1 { color: #00ffaa; text-shadow: 0 0 20px rgba(0,255,170,0.6); }
        #win-screen button.primary { border-color: #00ffaa; color: #00ffaa; background: rgba(0,255,170,0.1); }
        #win-screen button.primary:hover { background: #00ffaa; border-color: #00ffaa; color: black; box-shadow: 0 0 30px rgba(0,255,170,0.8); }
        
        #victory-screen h1 { color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.8); font-size: 90px; }
        
    </style>

    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import * as CANNON from 'cannon-es';

// --- CONFIG ---
const GAME_STATE = { MENU: 0, PLAYING: 1, DEAD: 2, WON: 3, VICTORY: 4 };
let currentState = GAME_STATE.MENU;
let mode = 'campaign'; // 'campaign' or 'infinite'
let currentLevel = 1;
const MAX_LEVELS = 25;

// --- GLOBALS ---
let scene, camera, renderer, world, controls;
let clock = new THREE.Clock();
let playerBody;
let entities = []; // Syncs Physics -> Three
let trucks = [];
let keys = { w:false, a:false, s:false, d:false, space:false, shift:false };

// Physics Materials
const physWorldMat = new CANNON.Material("world");
const physPlayerMat = new CANNON.Material("player");
const physTruckMat = new CANNON.Material("truck");

// Graphics Materials
const matGoal = new THREE.MeshStandardMaterial({ color: 0x00ffaa, transparent: true, opacity: 0.5, emissive: 0x00ffaa, emissiveIntensity: 0.5 });

// Config values
const LAVA_Y = 0;
let goalZ = -1000;
let distanceTraveled = 0;
let spawnZ = -50;
let lastTruckSpawnZ = 0;
const BASE_FOV = 80;
const MAX_FOV = 100;

// ============================
// === THEME MANAGER ===
// ============================
class ThemeManager {
    constructor() {
        this.currentBiome = 'urban';
        this.snowParticles = [];
        this.snowGroup = null;
    }
    
    getBiome(level) {
        if(level <= 5) return 'urban';
        if(level <= 15) return 'desert';
        return 'winter';
    }
    
    getTheme(biome) {
        const themes = {
            urban: {
                sky: 0x2a2a3a,
                fog: 0x2a2a3a,
                fogDensity: 0.004,
                ground: 0x333333,
                wallColor: 0x444455,
                wallAccent: 0x556677,
                ambient: 0x6666aa,
                dirLight: 0xeeeeff,
                fillLight: 0x4444aa,
                frictionMod: 1.0
            },
            desert: {
                sky: 0xf5c87a,
                fog: 0xf5c87a,
                fogDensity: 0.002,
                ground: 0xd4a843,
                wallColor: 0xc4944a,
                wallAccent: 0x8b6914,
                ambient: 0xffddaa,
                dirLight: 0xffeecc,
                fillLight: 0xddaa66,
                frictionMod: 1.0
            },
            winter: {
                sky: 0xc8d8ee,
                fog: 0xc8d8ee,
                fogDensity: 0.005,
                ground: 0xe8eef5,
                wallColor: 0xaabbcc,
                wallAccent: 0x889aaa,
                ambient: 0xaaccff,
                dirLight: 0xeef0ff,
                fillLight: 0x8899cc,
                frictionMod: 0.9 // 10% less friction = slippery
            }
        };
        return themes[biome] || themes.urban;
    }
    
    applyTheme(scene, biome) {
        this.currentBiome = biome;
        const t = this.getTheme(biome);
        scene.background = new THREE.Color(t.sky);
        scene.fog = new THREE.FogExp2(t.fog, t.fogDensity);
        return t;
    }
    
    createBiomeDecorations(scene, biome) {
        if(biome === 'urban') {
            // Neon street lights along the road
            const neonColors = [0xff0066, 0x00ffcc, 0xff6600, 0x6600ff];
            for(let i = 0; i < 30; i++) {
                const side = i % 2 === 0 ? 1 : -1;
                const zPos = 50 - i * 120;
                // Light pole
                const poleGeo = new THREE.BoxGeometry(0.3, 12, 0.3);
                const poleMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.set(side * 25, 6, zPos);
                scene.add(pole);
                // Neon light
                const neonColor = neonColors[i % neonColors.length];
                const lightGeo = new THREE.BoxGeometry(3, 0.3, 0.3);
                const lightMat = new THREE.MeshBasicMaterial({ color: neonColor });
                const light = new THREE.Mesh(lightGeo, lightMat);
                light.position.set(side * 24, 12, zPos);
                scene.add(light);
                // Point light glow
                const pl = new THREE.PointLight(neonColor, 0.5, 15);
                pl.position.copy(light.position);
                scene.add(pl);
            }
            // Skyscraper silhouettes
            const bldgMat = new THREE.MeshLambertMaterial({ color: 0x222233 });
            for(let i = 0; i < 20; i++) {
                const side = i % 2 === 0 ? 1 : -1;
                const h = 80 + Math.random() * 120;
                const geo = new THREE.BoxGeometry(20 + Math.random()*20, h, 20 + Math.random()*20);
                const m = new THREE.Mesh(geo, bldgMat);
                m.position.set(side * (60 + Math.random()*40), h/2, 100 - i * 200);
                scene.add(m);
            }
        } else if(biome === 'desert') {
            // Sandstone pillars
            const pillarMat = new THREE.MeshLambertMaterial({ color: 0xc4944a, flatShading: true });
            for(let i = 0; i < 15; i++) {
                const side = i % 2 === 0 ? 1 : -1;
                const h = 20 + Math.random() * 40;
                const geo = new THREE.CylinderGeometry(3 + Math.random()*4, 4 + Math.random()*5, h, 6);
                const m = new THREE.Mesh(geo, pillarMat);
                m.position.set(side * (35 + Math.random()*30), h/2, 50 - i * 180);
                m.castShadow = true;
                scene.add(m);
            }
        } else if(biome === 'winter') {
            // Pine tree silhouettes
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x4a3520 });
            const pineMat = new THREE.MeshLambertMaterial({ color: 0x2a5530 });
            for(let i = 0; i < 25; i++) {
                const side = i % 2 === 0 ? 1 : -1;
                const x = side * (30 + Math.random()*30);
                const z = 50 - i * 130;
                // Trunk
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 8, 6), trunkMat);
                trunk.position.set(x, 4, z);
                scene.add(trunk);
                // Pine cone layers
                for(let j = 0; j < 3; j++) {
                    const coneH = 5 - j;
                    const coneR = 4 - j * 1.2;
                    const cone = new THREE.Mesh(new THREE.ConeGeometry(coneR, coneH, 6), pineMat);
                    cone.position.set(x, 8 + j * 3, z);
                    cone.castShadow = true;
                    scene.add(cone);
                }
            }
            // Snow particles
            this.snowGroup = new THREE.Group();
            scene.add(this.snowGroup);
            const snowGeo = new THREE.SphereGeometry(0.1, 4, 4);
            const snowMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
            for(let i = 0; i < 200; i++) {
                const flake = new THREE.Mesh(snowGeo, snowMat);
                flake.position.set(
                    (Math.random()-0.5) * 60,
                    Math.random() * 30,
                    (Math.random()-0.5) * 200
                );
                this.snowGroup.add(flake);
                this.snowParticles.push({
                    mesh: flake,
                    speedY: 2 + Math.random() * 3,
                    driftX: (Math.random()-0.5) * 2
                });
            }
        }
    }
    
    updateSnow(dt, playerZ) {
        if(this.currentBiome !== 'winter' || !this.snowGroup) return;
        this.snowParticles.forEach(p => {
            p.mesh.position.y -= p.speedY * dt;
            p.mesh.position.x += p.driftX * dt;
            if(p.mesh.position.y < 0) {
                p.mesh.position.y = 25 + Math.random() * 10;
                p.mesh.position.z = playerZ + (Math.random()-0.5) * 100;
                p.mesh.position.x = (Math.random()-0.5) * 60;
            }
        });
    }
}

// ============================
// === AUDIO MANAGER ===
// ============================
class AudioManager {
    constructor() {
        this.ctx = null;
        this.masterGain = null;
        this.bgmGain = null;
        this.bgmFilter = null; // Low-pass for menu
        this.bgmPlaying = false;
        this.initialized = false;
        this.currentTrack = 0;
        this._allOscs = [];
    }
    
    init() {
        if(this.initialized) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.5;
        this.masterGain.connect(this.ctx.destination);
        
        // BGM chain: oscillators -> bgmGain -> bgmFilter -> masterGain
        this.bgmGain = this.ctx.createGain();
        this.bgmGain.gain.value = 1.0;
        this.bgmFilter = this.ctx.createBiquadFilter();
        this.bgmFilter.type = 'lowpass';
        this.bgmFilter.frequency.value = 20000; // Wide open by default
        this.bgmGain.connect(this.bgmFilter);
        this.bgmFilter.connect(this.masterGain);
        
        this.initialized = true;
    }
    
    resume() {
        if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }
    
    // State-based volume
    setMenuMode() {
        if(!this.initialized) return;
        this.bgmGain.gain.setTargetAtTime(0.3, this.ctx.currentTime, 0.5);
        this.bgmFilter.frequency.setTargetAtTime(400, this.ctx.currentTime, 0.3); // Muffled
    }
    
    setGameMode() {
        if(!this.initialized) return;
        this.bgmGain.gain.setTargetAtTime(1.0, this.ctx.currentTime, 0.3);
        this.bgmFilter.frequency.setTargetAtTime(20000, this.ctx.currentTime, 0.3); // Full
    }
    
    // Playlist of 4 tracks (each with different note patterns and wave types)
    _getTrackConfig(idx) {
        const tracks = [
            { // Track 1: Classic Synthwave
                bass: 55, bassType: 'sawtooth', bpm: 180,
                arp: [220, 330, 440, 330, 220, 175, 220, 330],
                arpType: 'square', pad: [110, 165, 220]
            },
            { // Track 2: Dark Phonk
                bass: 41, bassType: 'square', bpm: 140,
                arp: [165, 220, 275, 220, 330, 275, 220, 165],
                arpType: 'sawtooth', pad: [82, 123, 165]
            },
            { // Track 3: Fast Synth
                bass: 65, bassType: 'sawtooth', bpm: 200,
                arp: [330, 440, 550, 660, 550, 440, 330, 440],
                arpType: 'square', pad: [130, 195, 260]
            },
            { // Track 4: Chill Wave
                bass: 48, bassType: 'triangle', bpm: 160,
                arp: [196, 294, 392, 294, 196, 147, 196, 294],
                arpType: 'sine', pad: [98, 147, 196]
            }
        ];
        return tracks[idx % tracks.length];
    }
    
    startBGM(trackIdx = 0) {
        if(!this.initialized) return;
        this.stopBGM();
        this.bgmPlaying = true;
        this.currentTrack = trackIdx;
        
        const cfg = this._getTrackConfig(trackIdx);
        
        // Bass
        const bassOsc = this.ctx.createOscillator();
        bassOsc.type = cfg.bassType;
        bassOsc.frequency.value = cfg.bass;
        const bassFilter = this.ctx.createBiquadFilter();
        bassFilter.type = 'lowpass';
        bassFilter.frequency.value = 200;
        const bassG = this.ctx.createGain(); bassG.gain.value = 0.08;
        bassOsc.connect(bassFilter); bassFilter.connect(bassG); bassG.connect(this.bgmGain);
        bassOsc.start();
        this._allOscs.push(bassOsc);
        
        // Arp
        const arpOsc = this.ctx.createOscillator();
        arpOsc.type = cfg.arpType;
        const arpFilter = this.ctx.createBiquadFilter();
        arpFilter.type = 'lowpass'; arpFilter.frequency.value = 800;
        const arpG = this.ctx.createGain(); arpG.gain.value = 0.04;
        arpOsc.connect(arpFilter); arpFilter.connect(arpG); arpG.connect(this.bgmGain);
        arpOsc.start();
        this._allOscs.push(arpOsc);
        
        let arpIdx = 0;
        this._bgmInterval = setInterval(() => {
            if(!this.bgmPlaying) return;
            arpOsc.frequency.setTargetAtTime(cfg.arp[arpIdx % cfg.arp.length], this.ctx.currentTime, 0.02);
            arpIdx++;
        }, 60000 / cfg.bpm);
        
        // Pad
        const padG = this.ctx.createGain(); padG.gain.value = 0.03;
        padG.connect(this.bgmGain);
        cfg.pad.forEach(f => {
            const o = this.ctx.createOscillator();
            o.type = 'sine'; o.frequency.value = f;
            o.connect(padG); o.start();
            this._allOscs.push(o);
        });
    }
    
    // Crossfade to next track
    crossfadeTrack(newIdx) {
        if(!this.initialized) return;
        // Fade out current
        this.bgmGain.gain.setTargetAtTime(0.0, this.ctx.currentTime, 0.5);
        setTimeout(() => {
            this.startBGM(newIdx);
            this.bgmGain.gain.setTargetAtTime(1.0, this.ctx.currentTime, 0.3);
        }, 800);
    }
    
    stopBGM() {
        this.bgmPlaying = false;
        if(this._bgmInterval) clearInterval(this._bgmInterval);
        this._allOscs.forEach(o => { try { o.stop(); } catch(e) {} });
        this._allOscs = [];
    }
    
    playClang(volume = 0.3) {
        if(!this.initialized) return;
        const g = this.ctx.createGain();
        g.gain.value = volume; g.connect(this.masterGain);
        const osc = this.ctx.createOscillator();
        osc.type = 'square'; osc.frequency.value = 200 + Math.random() * 300;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.value = 500;
        osc.connect(filter); filter.connect(g);
        g.gain.setValueAtTime(volume, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
        osc.start(); osc.stop(this.ctx.currentTime + 0.15);
    }
    
    playExplosion() {
        if(!this.initialized) return;
        const g = this.ctx.createGain(); g.gain.value = 0.5; g.connect(this.masterGain);
        const osc = this.ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 80;
        osc.frequency.exponentialRampToValueAtTime(20, this.ctx.currentTime + 0.5);
        osc.connect(g);
        g.gain.setValueAtTime(0.5, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.6);
        osc.start(); osc.stop(this.ctx.currentTime + 0.6);
        // Noise
        const bs = this.ctx.sampleRate * 0.3;
        const buf = this.ctx.createBuffer(1, bs, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for(let i=0;i<bs;i++) d[i]=(Math.random()*2-1)*(1-i/bs);
        const n = this.ctx.createBufferSource(); n.buffer = buf;
        const ng = this.ctx.createGain(); ng.gain.value = 0.3; ng.connect(this.masterGain);
        n.connect(ng); ng.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.4); n.start();
    }
    
    playEngineHum() {
        if(!this.initialized || this.engineOsc) return;
        const g = this.ctx.createGain(); g.gain.value = 0.02; g.connect(this.masterGain);
        this.engineOsc = this.ctx.createOscillator(); this.engineOsc.type = 'sawtooth'; this.engineOsc.frequency.value = 60;
        const f = this.ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 150;
        this.engineOsc.connect(f); f.connect(g); this.engineOsc.start(); this.engineGain = g;
    }
    
    updateEngineHum(playerSpeed) {
        if(!this.engineOsc) return;
        const pitch = 50 + Math.abs(playerSpeed) * 1.5;
        this.engineOsc.frequency.setTargetAtTime(Math.min(pitch, 200), this.ctx.currentTime, 0.1);
    }
}

// ============================
// === VFX MANAGER ===
// ============================
class VFXManager {
    constructor() {
        this.windParticles = [];
        this.explosionParticles = [];
        this.windGroup = null;
    }
    
    init(scene) {
        this.windGroup = new THREE.Group();
        scene.add(this.windGroup);
        const streakGeo = new THREE.BoxGeometry(0.03, 0.03, 2.0);
        const streakMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        for(let i = 0; i < 40; i++) {
            const streak = new THREE.Mesh(streakGeo, streakMat.clone());
            streak.visible = false;
            this.windGroup.add(streak);
            this.windParticles.push({ mesh: streak, vel: new THREE.Vector3(), life: 0 });
        }
    }
    
    updateWindStreaks(playerPos, playerSpeed, dt) {
        const speedMag = Math.abs(playerSpeed);
        const intensity = Math.max(0, (speedMag - 15) / 30);
        this.windParticles.forEach(p => {
            if(p.life > 0) {
                p.life -= dt;
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.mesh.material.opacity = p.life * 0.4 * intensity;
                if(p.life <= 0) p.mesh.visible = false;
            } else if(intensity > 0.1 && Math.random() < intensity * 0.5) {
                p.mesh.visible = true;
                p.mesh.position.set(
                    playerPos.x + (Math.random()-0.5)*6,
                    playerPos.y + (Math.random()-0.5)*3,
                    playerPos.z - 3 - Math.random()*8
                );
                p.vel.set((Math.random()-0.5)*2, (Math.random()-0.5), 15+Math.random()*10);
                p.life = 0.3 + Math.random()*0.4;
                p.mesh.material.opacity = 0.3;
            }
        });
    }
    
    spawnExplosion(pos) {
        const colors = [0xff4400, 0xff8800, 0xffcc00, 0x333333];
        for(let i = 0; i < 15; i++) {
            const size = 0.3 + Math.random()*0.8;
            const geo = new THREE.BoxGeometry(size,size,size);
            const mat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random()*colors.length)], transparent:true, opacity:1});
            const mesh = new THREE.Mesh(geo, mat); mesh.position.copy(pos); scene.add(mesh);
            this.explosionParticles.push({
                mesh, vel: new THREE.Vector3((Math.random()-0.5)*20, 5+Math.random()*15, (Math.random()-0.5)*20), life: 0.5+Math.random()
            });
        }
    }
    
    updateExplosions(dt) {
        for(let i = this.explosionParticles.length-1; i >= 0; i--) {
            const p = this.explosionParticles[i];
            p.life -= dt; p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
            p.vel.y -= 20*dt; p.mesh.material.opacity = Math.max(0, p.life);
            p.mesh.rotation.x += dt*5; p.mesh.rotation.z += dt*3;
            if(p.life <= 0) { scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); this.explosionParticles.splice(i,1); }
        }
    }
    
    updateFOV(camera, playerSpeed, dt) {
        const targetFOV = BASE_FOV + Math.min(Math.abs(playerSpeed)*0.3, MAX_FOV-BASE_FOV);
        camera.fov += (targetFOV - camera.fov)*3.0*dt;
        camera.updateProjectionMatrix();
    }
}

const themeMgr = new ThemeManager();
const audioMgr = new AudioManager();
const vfxMgr = new VFXManager();

// Init Engine
function init() {
    // 1. Three.js Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.003);
    
    camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 800);
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientInfo = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambientInfo);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(100, 200, 50);
    dirLight.castShadow = true;
    dirLight.shadow.camera.near = 10;
    dirLight.shadow.camera.far = 500;
    dirLight.shadow.camera.left = -100;
    dirLight.shadow.camera.right = 100;
    dirLight.shadow.camera.top = 100;
    dirLight.shadow.camera.bottom = -100;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // Fill Light
    const fillLight = new THREE.DirectionalLight(0xaaccff, 0.5);
    fillLight.position.set(-100, 50, -50);
    scene.add(fillLight);

    // 2. Cannon.js Setup
    world = new CANNON.World({
        gravity: new CANNON.Vec3(0, -30, 0),
    });
    world.broadphase = new CANNON.SAPBroadphase(world);
    world.solver.iterations = 10;
    world.defaultContactMaterial.friction = 0.0;
    
    // Contact materials
    const contactTruckPlayer = new CANNON.ContactMaterial(physTruckMat, physPlayerMat, { friction: 0.3, restitution: 0.0 });
    world.addContactMaterial(contactTruckPlayer);
    
    // Truck-to-Truck: low friction, some bounciness for satisfying side-slams
    const contactTruckTruck = new CANNON.ContactMaterial(physTruckMat, physTruckMat, { friction: 0.1, restitution: 0.3 });
    world.addContactMaterial(contactTruckTruck);
    
    // Controls
    controls = new PointerLockControls(camera, document.body);
    
    // UI Event Listeners
    document.getElementById('btn-campaign').addEventListener('click', () => { mode = 'campaign'; currentLevel = 1; startGame(); });
    document.getElementById('btn-infinite').addEventListener('click', () => { mode = 'infinite'; startGame(); });
    document.getElementById('btn-restart-death').addEventListener('click', () => { startGame(); });
    document.getElementById('btn-menu-death').addEventListener('click', showMenu);
    document.getElementById('btn-next-level').addEventListener('click', () => { currentLevel++; startGame(); });
    document.getElementById('btn-menu-win').addEventListener('click', showMenu);
    document.getElementById('btn-menu-vic').addEventListener('click', showMenu);
    
    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
        if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
        if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
        if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
        if(e.code === 'Space') keys.space = true;
        if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = true;
    });
    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
        if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
        if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
        if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
        if(e.code === 'Space') keys.space = false;
        if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = false;
    });

    controls.addEventListener('lock', () => { if(currentState === GAME_STATE.PLAYING) showHUD(); });
    controls.addEventListener('unlock', () => { if(currentState === GAME_STATE.PLAYING) showPauseMenu(); });
    document.addEventListener('mousedown', () => {
        if(currentState === GAME_STATE.PLAYING && !controls.isLocked) controls.lock();
    });

    window.addEventListener('resize', onWindowResize);
    
    // Init VFX
    vfxMgr.init(scene);
    
    animate();
}

function showMenu() {
    currentState = GAME_STATE.MENU;
    document.exitPointerLock();
    hideAllScreens();
    document.getElementById('menu-screen').classList.remove('hidden');
    clearWorld();
}

function showHUD() {
    document.getElementById('crosshair').classList.remove('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('game-hint').classList.remove('hidden');
}

function hideHUD() {
    document.getElementById('crosshair').classList.add('hidden');
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('game-hint').classList.add('hidden');
}

function hideAllScreens() {
    const screens = document.querySelectorAll('.screen');
    screens.forEach(s => s.classList.add('hidden'));
    hideHUD();
}

function showPauseMenu() {
    // Basic unpaused behavior
    document.getElementById('crosshair').classList.add('hidden');
}

function clearWorld() {
    // Remove physics bodies and threejs meshes
    entities.forEach(e => {
        if(e.body) world.removeBody(e.body);
        if(e.mesh) scene.remove(e.mesh);
    });
    // Remove constraints
    world.constraints.forEach(c => world.removeConstraint(c));
    entities = [];
    trucks = [];
    
    if(playerBody) {
        world.removeBody(playerBody);
        playerBody = null;
    }
}

function startGame() {
    currentState = GAME_STATE.PLAYING;
    hideAllScreens();
    showHUD();
    clearWorld();
    
    // Audio
    audioMgr.init();
    audioMgr.resume();
    audioMgr.setGameMode();
    audioMgr.playEngineHum();
    
    // Pick music track based on biome
    const biome = mode === 'campaign' ? themeMgr.getBiome(currentLevel) : 'desert';
    const trackMap = { urban: 0, desert: 1, winter: 2 };
    audioMgr.crossfadeTrack(trackMap[biome] || 0);
    
    // Center message
    const msg = document.getElementById('center-msg');
    msg.innerHTML = mode === 'campaign' ? `УРОВЕНЬ ${Math.floor((currentLevel-1)/5)+1}:${((currentLevel-1)%5)+1}` : "УРОВЕНЬ БЕСКОНЕЧНЫЙ";
    msg.style.opacity = '1';

    // Setup Environment with biome theme
    createEnvironment(biome);
    
    createPlayer();
    controls.lock();

    spawnZ = -10;
    distanceTraveled = 0;
    lastTruckSpawnZ = 0;

    if(mode === 'campaign') {
        loadCampaignLevel(currentLevel);
    } else {
        goalZ = -Infinity;
        spawnInitialTrucksInfinite();
    }
}

function createEnvironment(biome = 'urban') {
    // Apply biome theme
    const theme = themeMgr.applyTheme(scene, biome);

    // Ground with biome color
    const geoSolid = new THREE.PlaneGeometry(2000, 20000);
    const matSolid = new THREE.MeshStandardMaterial({ color: theme.ground, roughness: 1.0 });
    const meshSolid = new THREE.Mesh(geoSolid, matSolid);
    meshSolid.rotation.x = -Math.PI / 2;
    meshSolid.position.y = LAVA_Y - 0.5;
    meshSolid.receiveShadow = true;
    scene.add(meshSolid);

    // Canyon walls with biome color
    const matM = new THREE.MeshStandardMaterial({color: theme.wallColor, roughness: 1.0, flatShading: true});
    for(let i=0; i<40; i++) {
        const side = i % 2 === 0 ? 1 : -1;
        const zPos = 100 - i * 150;
        const geoM = new THREE.BoxGeometry(60 + Math.random()*40, 100 + Math.random()*150, 60 + Math.random()*40);
        const meshM = new THREE.Mesh(geoM, matM);
        meshM.position.set(side * (100 + Math.random()*20), LAVA_Y, zPos);
        meshM.castShadow = true; meshM.receiveShadow = true;
        scene.add(meshM);
        entities.push({ mesh: meshM, body: null });
    }
    
    // Biome-specific decorations
    themeMgr.createBiomeDecorations(scene, biome);

    // Physics Ground
    const groundShape = new CANNON.Plane();
    const groundBody = new CANNON.Body({ mass: 0 });
    groundBody.addShape(groundShape);
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
    groundBody.position.set(0, LAVA_Y - 0.5, 0);
    groundBody.collisionFilterGroup = 1;
    groundBody.collisionFilterMask = 2 | 4;
    world.addBody(groundBody);
    
    entities.push({ mesh: null, body: groundBody });
}

function createPlayer() {
    const shape = new CANNON.Sphere(0.6);
    playerBody = new CANNON.Body({ mass: 50, material: physPlayerMat });
    playerBody.addShape(shape);
    playerBody.position.set(0, 10, 0);
    playerBody.linearDamping = 0; // Custom damping applied in update loop
    playerBody.fixedRotation = true;
    playerBody.collisionFilterGroup = 2; // Player group
    playerBody.collisionFilterMask = 1 | 4; // Collide with ground and trucks
    playerBody.updateMassProperties();
    world.addBody(playerBody);
}

function spawnTruck(x, y, z, speed, hasTrailer = true) {
    const truckGrp = new THREE.Group();
    
    // Physics Body — locked rotation, trucks CAN collide with each other (side-slamming)
    const truckBody = new CANNON.Body({ mass: hasTrailer ? 8000 : 5000, material: physTruckMat });
    truckBody.linearDamping = 0.2;
    truckBody.angularDamping = 0.99;
    truckBody.fixedRotation = true; // No spinning — only lateral push from collisions
    // Collision group 4 = trucks. Mask = 1|2|4 = ground + player + OTHER TRUCKS
    truckBody.collisionFilterGroup = 4;
    truckBody.collisionFilterMask = 1 | 2 | 4; // collide with everything including other trucks

    // === CLUSTERTRUCK-ACCURATE TRUCK MODEL ===
    // Materials — clean white flat-shaded like the original
    const matBody = new THREE.MeshLambertMaterial({ color: 0xf0f0f0 });
    const matBodySide = new THREE.MeshLambertMaterial({ color: 0xe8e8e8 });
    const matGlass = new THREE.MeshLambertMaterial({ color: 0x1a1a2e });
    const matWheelBlack = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
    const matBumper = new THREE.MeshLambertMaterial({ color: 0xcccccc });
    const matUnder = new THREE.MeshLambertMaterial({ color: 0x555555 });

    // --- CAB (Front, small box) ---
    // In Clustertruck the cab is a compact box at the front
    // Dimensions: W=2.4, H=2.8, D=3.0
    const cabW = 2.4, cabH = 2.8, cabD = 3.0;
    
    // Physics cab collider
    const cabShape = new CANNON.Box(new CANNON.Vec3(cabW/2, cabH/2, cabD/2));
    truckBody.addShape(cabShape, new CANNON.Vec3(0, cabH/2, 0));
    
    const cabGrp = new THREE.Group();
    
    // Main cab body
    const cabMain = new THREE.Mesh(new THREE.BoxGeometry(cabW, cabH, cabD), matBody);
    cabMain.position.set(0, cabH/2, 0);
    cabMain.castShadow = true; cabMain.receiveShadow = true;
    cabGrp.add(cabMain);
    
    // Windshield (front face, slightly inset)
    const wsW = cabW * 0.9, wsH = cabH * 0.35;
    const wsMesh = new THREE.Mesh(new THREE.BoxGeometry(wsW, wsH, 0.15), matGlass);
    wsMesh.position.set(0, cabH * 0.65, -cabD/2 - 0.05);
    cabGrp.add(wsMesh);
    
    // Front bumper
    const bumper = new THREE.Mesh(new THREE.BoxGeometry(cabW + 0.2, 0.5, 0.3), matBumper);
    bumper.position.set(0, 0.25, -cabD/2 - 0.1);
    cabGrp.add(bumper);
    
    // Chassis/undercarriage visible between cab and trailer
    const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, cabD + 1), matUnder);
    chassis.position.set(0, 0.2, 0);
    cabGrp.add(chassis);
    
    truckGrp.add(cabGrp);
    
    // Cab front wheels (2)
    const wheelRadius = 0.55;
    const wheelThick = 0.4;
    const wheelGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, wheelThick, 10);
    wheelGeo.rotateZ(Math.PI / 2);
    
    const fwl = new THREE.Mesh(wheelGeo, matWheelBlack); fwl.position.set(-cabW/2 - 0.1, wheelRadius, -cabD/2 + 0.6); fwl.castShadow = true;
    const fwr = new THREE.Mesh(wheelGeo, matWheelBlack); fwr.position.set(cabW/2 + 0.1, wheelRadius, -cabD/2 + 0.6); fwr.castShadow = true;
    truckGrp.add(fwl); truckGrp.add(fwr);

    if(hasTrailer) {
        // --- TRAILER (long box behind cab with gap) ---
        // Clustertruck trailer: W=2.6, H=3.2, D=10.0 — long and tall
        const trW = 2.6, trH = 3.2, trD = 10.0;
        const gapD = 1.5; // Gap between cab and trailer (coupling space)
        const trailerZ = cabD/2 + gapD + trD/2; // Center Z of trailer
        
        // Physics trailer collider
        const trailerShape = new CANNON.Box(new CANNON.Vec3(trW/2, trH/2, trD/2));
        truckBody.addShape(trailerShape, new CANNON.Vec3(0, trH/2, trailerZ));
        
        const trailerGrp = new THREE.Group();
        
        // Main trailer body
        const trailerMain = new THREE.Mesh(new THREE.BoxGeometry(trW, trH, trD), matBody);
        trailerMain.position.set(0, trH/2, trailerZ);
        trailerMain.castShadow = true; trailerMain.receiveShadow = true;
        trailerGrp.add(trailerMain);
        
        // Rear door (dark panel at back)
        const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(trW - 0.2, trH - 0.3, 0.12), matGlass);
        doorMesh.position.set(0, trH/2, trailerZ + trD/2 + 0.05);
        trailerGrp.add(doorMesh);
        
        // Bottom rail under trailer
        const railMesh = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.3, trD + gapD), matUnder);
        railMesh.position.set(0, 0.15, trailerZ - gapD/2);
        trailerGrp.add(railMesh);
        
        truckGrp.add(trailerGrp);
        
        // Rear wheels (4: dual axle at back of trailer)
        const rearZ1 = trailerZ + trD/2 - 1.5;
        const rearZ2 = trailerZ + trD/2 - 2.8;
        const rearOffs = trW/2 + 0.1;
        
        [[- rearOffs, wheelRadius, rearZ1], [rearOffs, wheelRadius, rearZ1],
         [- rearOffs, wheelRadius, rearZ2], [rearOffs, wheelRadius, rearZ2]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, matWheelBlack);
            w.position.set(p[0], p[1], p[2]); w.castShadow = true;
            truckGrp.add(w);
        });
        
        // Cab rear wheels (behind cab body)
        const cabRearZ = cabD/2 - 0.3;
        const crl = new THREE.Mesh(wheelGeo, matWheelBlack); crl.position.set(-cabW/2 - 0.1, wheelRadius, cabRearZ); crl.castShadow = true;
        const crr = new THREE.Mesh(wheelGeo, matWheelBlack); crr.position.set(cabW/2 + 0.1, wheelRadius, cabRearZ); crr.castShadow = true;
        truckGrp.add(crl); truckGrp.add(crr);
    }
    
    // Position body — truck origin is at ground level at the cab front
    truckBody.position.set(x, y, z);
    truckBody.velocity.set(0, 0, -speed);
    world.addBody(truckBody);
    
    scene.add(truckGrp);
    entities.push({ mesh: truckGrp, body: truckBody });
    
    const truckObj = { 
        cab: truckBody, speed: speed, meshGrp: truckGrp, 
        targetX: x, // STAYS as spawn lane — NO lane changes
        spawnX: x   // Original lane for reference
    };
    trucks.push(truckObj);
    return truckObj;
}

// --- LEVEL GENERATION ---

function buildBaseTrack(length) {
    // Goal Zone
    goalZ = -length + 10;
    const goalGeo = new THREE.BoxGeometry(60, 50, 10);
    const goalMesh = new THREE.Mesh(goalGeo, matGoal);
    goalMesh.position.set(0, 25, goalZ);
    scene.add(goalMesh);
    entities.push({ mesh: goalMesh, body: null });
}

function loadCampaignLevel(lvl) {
    let trackLen = 300 + (lvl * 50);
    buildBaseTrack(trackLen);
    
    // Spawn Player safely on first truck
    const safeTruck = spawnTruck(0, LAVA_Y + 0.5, -10, 22);
    safeTruck.isSafe = true;
    safeTruck.cab.velocity.set(0, 0, -22);
    playerBody.position.set(0, safeTruck.cab.position.y + 4.5, safeTruck.cab.position.z + 6);
    playerBody.velocity.set(0, 0, -22);
    
    // Spawn Level Trucks in proper column formations
    const truckCount = Math.min(20 + lvl * 5, 80);
    let curZ = -30;
    // 3 main lanes as in Clustertruck (wide spacing so no overlap)
    const lanes = [-8, 0, 8];
    
    for(let i=0; i<truckCount; i++) {
        let lane = lanes[i % lanes.length];
        let tkSpeed = 20 + Math.random() * 3 + (lvl * 0.4); // 10% speed boost
        
        if(i % lanes.length === 0) {
            // New row — advance Z 
            curZ -= (18 + Math.random() * 6);
        }
        
        let offset = (Math.random() - 0.5) * 1.0; // Tiny offset for natural look
        spawnTruck(lane + offset, LAVA_Y + 0.5, curZ + (Math.random()-0.5)*2, tkSpeed);
        
        // Random obstacles starting from level 3
        if(lvl >= 3 && Math.random() < 0.15 && curZ > goalZ + 50 && i % lanes.length === 0) {
            spawnVariedObstacle(curZ - 15);
        }
        
        if (curZ < goalZ - 20) break;
    }
}

function spawnVariedObstacle(z) {
    const type = Math.floor(Math.random() * 5); // 5 types now
    const biome = mode === 'campaign' ? themeMgr.getBiome(currentLevel) : 'desert';
    const theme = themeMgr.getTheme(biome);
    const mat = new THREE.MeshStandardMaterial({color: theme.wallAccent, roughness: 0.8, metalness: 0.3});
    
    const spawnBlock = (x, y, w, h, d, zOffset = 0) => {
        const shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
        const body = new CANNON.Body({ mass: 0 });
        body.addShape(shape);
        body.position.set(x, y, z + zOffset);
        body.collisionFilterGroup = 1;
        body.collisionFilterMask = 2 | 4;
        world.addBody(body);
        
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        mesh.castShadow = true; mesh.receiveShadow = true;
        scene.add(mesh);
        entities.push({ mesh: mesh, body: body });
    };

    let lvlDiff = mode === 'campaign' ? currentLevel : 5;

    if (type === 0) {
        // Narrow passage
        let squeeze = Math.min(10, lvlDiff * 1.2); 
        spawnBlock(-20 + squeeze, LAVA_Y + 10, 15, 20, 10);
        spawnBlock(20 - squeeze, LAVA_Y + 10, 15, 20, 10);
    } else if (type === 1) {
        // Staggered Slalom
        const side = Math.random() > 0.5 ? 1 : -1;
        spawnBlock(side * 12, LAVA_Y + 10, 22, 20, 10);
        if (lvlDiff >= 3) {
            spawnBlock(-side * 12, LAVA_Y + 10, 22, 20, 10, -30);
        }
    } else if (type === 2) {
        // The Zig-Zag: staggered walls forcing convoy to snake
        for(let s = 0; s < 4; s++) {
            const side = s % 2 === 0 ? -1 : 1;
            spawnBlock(side * 10, LAVA_Y + 8, 18, 16, 6, -s * 25);
        }
    } else if (type === 3) {
        // The Bridge: narrow elevated section, fall = death
        const bridgeW = 8;
        // Left wall
        spawnBlock(-bridgeW - 8, LAVA_Y + 5, 12, 10, 40);
        // Right wall  
        spawnBlock(bridgeW + 8, LAVA_Y + 5, 12, 10, 40);
        // Bridge floor (elevated ramp-ish)
        spawnBlock(0, LAVA_Y + 2, bridgeW * 2, 1, 40);
    } else if (type === 4) {
        // The Tunnel: low ceiling forces precise jumping
        spawnBlock(-15, LAVA_Y + 10, 10, 20, 8);
        spawnBlock(15, LAVA_Y + 10, 10, 20, 8);
        // Ceiling
        spawnBlock(0, LAVA_Y + 8, 30, 2, 8);
    }
}

function spawnInitialTrucksInfinite() {
    // 3-lane formation like Clustertruck
    const lanes = [-8, 0, 8];
    
    // Center truck — player starts here
    const t1 = spawnTruck(0, LAVA_Y + 0.5, -10, 22);
    t1.isSafe = true;
    t1.cab.velocity.set(0, 0, -22);
    playerBody.position.set(0, t1.cab.position.y + 4.5, -10 + 6);
    playerBody.velocity.set(0, 0, -22);
    
    // Flanking trucks in lanes
    spawnTruck(-8, LAVA_Y + 0.5, -10, 22);
    spawnTruck(8, LAVA_Y + 0.5, -10, 22);
    
    lastTruckSpawnZ = -10;
    fillInfiniteTrucks();
}

function fillInfiniteTrucks() {
    const spawnAhead = playerBody.position.z - 300;
    const lanes = [-8, 0, 8]; // 3-lane formation
    
    while(lastTruckSpawnZ > spawnAhead) {
        lastTruckSpawnZ -= (18 + Math.random() * 10); // Row spacing
        
        // Spawn 2-3 trucks per row (sometimes a gap in one lane)
        const numInRow = 2 + Math.floor(Math.random() * 2); // 2 or 3
        const shuffledLanes = lanes.slice().sort(() => Math.random() - 0.5);
        
        for(let i = 0; i < numInRow && i < shuffledLanes.length; i++) {
            let tkSpeed = 20 + Math.random() * 4 + (distanceTraveled / 400); // 10% speed boost
            let offset = (Math.random() - 0.5) * 1.0;
            spawnTruck(shuffledLanes[i] + offset, LAVA_Y + 0.5, lastTruckSpawnZ + (Math.random()-0.5)*3, tkSpeed);
        }
    }
}

function die() {
    currentState = GAME_STATE.DEAD;
    document.exitPointerLock();
    hideAllScreens();
    document.getElementById('death-screen').classList.remove('hidden');
}

function win() {
    currentState = GAME_STATE.WON;
    document.exitPointerLock();
    hideAllScreens();
    
    if(currentLevel >= MAX_LEVELS) {
        document.getElementById('victory-screen').classList.remove('hidden');
    } else {
        document.getElementById('win-screen').classList.remove('hidden');
    }
}

// --- UPDATE LOOP ---

let isGrounded = false;
let contactVelocity = new CANNON.Vec3();

function updatePhysics(dt) {
    if(currentState !== GAME_STATE.PLAYING) return;

    world.step(1/60, dt, 3);
    
    // Sync Three -> Cannon
    entities.forEach(e => {
        if(e.body && e.mesh) {
            e.mesh.position.copy(e.body.position);
            e.mesh.quaternion.copy(e.body.quaternion);
        }
    });

    // 1. Truck AI — Clustertruck style: drift to center, side-slam, explosions
    for(let ti = trucks.length - 1; ti >= 0; ti--) {
        const t = trucks[ti];
        
        // Skip exploded trucks
        if(t.exploded) {
            t.explodeTimer -= dt;
            if(t.explodeTimer <= 0) {
                // Remove exploded truck
                world.removeBody(t.cab);
                scene.remove(t.meshGrp);
                trucks.splice(ti, 1);
            }
            continue;
        }
        
        t.cab.wakeUp();
        
        // Lock rotation — no spin, only lateral push from collisions
        t.cab.quaternion.set(0, 0, 0, 1);
        t.cab.angularVelocity.set(0, 0, 0);
        
        // Drive forward at constant speed (hard-set Z) — 10% speed boost
        t.cab.velocity.z = -t.speed;
        
        // === STUCK DETECTION: If truck barely moves forward for 3s, evade ===
        if(!t.stuckTimer) t.stuckTimer = 0;
        if(Math.abs(t.cab.velocity.z) < 1.0) {
            t.stuckTimer += dt;
            if(t.stuckTimer > 3.0) {
                // Evasive maneuver — hard steer left or right
                const evadeDir = (Math.random() > 0.5 ? 1 : -1) * 15;
                t.cab.velocity.x = evadeDir;
                t.stuckTimer = 0;
            }
        } else {
            t.stuckTimer = 0;
        }
        
        // === CLUSTERTRUCK DRIFT: All trucks pull toward center ===
        const centerPull = 4.0; // STRONGER pull for more aggressive slamming
        const diffToCenter = 0 - t.cab.position.x;
        
        // Apply lateral FORCE so physics collisions work naturally
        t.cab.applyForce(
            new CANNON.Vec3(diffToCenter * centerPull * t.cab.mass * 0.4, 0, 0),
            t.cab.position
        );
        
        // Damp lateral velocity
        t.cab.velocity.x *= 0.90;
        
        // Clamp lateral — don't escape too far
        if(Math.abs(t.cab.position.x) > 25) {
            t.cab.velocity.x += Math.sign(-t.cab.position.x) * 8;
        }
        
        // === COLLISION DETECTION: Anti-clipping + Explosions ===
        // Check against nearby trucks for high-speed impact
        for(let j = ti + 1; j < trucks.length; j++) {
            const other = trucks[j];
            if(other.exploded) continue;
            
            const dx = t.cab.position.x - other.cab.position.x;
            const dz = t.cab.position.z - other.cab.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            
            if(dist < 6) {
                // Anti-rear-end-clipping: If one truck is directly behind another, repulse
                if(Math.abs(dx) < 2.5 && Math.abs(dz) < 14) {
                    const repulse = dz > 0 ? 5 : -5;
                    t.cab.velocity.z += repulse;
                    other.cab.velocity.z -= repulse;
                    audioMgr.playClang(0.15);
                }
                
                // High-speed lateral collision = explosion
                const relVelX = Math.abs(t.cab.velocity.x - other.cab.velocity.x);
                if(relVelX > 12 && dist < 4) {
                    // EXPLODE the lighter/slower truck
                    const victim = (t.speed < other.speed) ? t : other;
                    explodeTruck(victim);
                    audioMgr.playExplosion();
                }
                
                // Side-slam clang
                if(Math.abs(dx) < 3.5 && Math.abs(dx) > 1.5 && relVelX > 3) {
                    audioMgr.playClang(Math.min(relVelX / 20, 0.5));
                }
            }
        }
        
        // Keep trucks grounded
        if(t.cab.position.y < LAVA_Y + 0.5) {
            t.cab.position.y = LAVA_Y + 0.5;
            t.cab.velocity.y = 0;
        }
        if(t.cab.position.y > LAVA_Y + 4) {
            t.cab.velocity.y = -8;
        }
    }

    // 2. Player Raycast (Grounded Check & Momentum)
    isGrounded = false;
    contactVelocity.set(0,0,0);
    let hitBody = null;
    
    // Start raycast at player's center to ensure it hits the top of trucks reliably
    const start = new CANNON.Vec3(playerBody.position.x, playerBody.position.y, playerBody.position.z);
    const end = new CANNON.Vec3(playerBody.position.x, playerBody.position.y - 1.2, playerBody.position.z);
    
    const result = new CANNON.RaycastResult();
    // Mask 1|4 = ground + trucks (player is group 2, excluded)
    world.raycastClosest(start, end, { skipBackfaces: true, collisionFilterMask: 1 | 4 }, result);
    if (result.hasHit) {
        isGrounded = true;
        hitBody = result.body;
        contactVelocity.copy(result.body.velocity);
    }

    // 3. Player Input & Movement
    let speed = keys.shift ? 36 : 20; // 20% maxSpeed nerf

    // Calc input direction based on camera yaw
    const camEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
    const yaw = camEuler.y;
    
    let inputVec = new THREE.Vector3(0,0,0);
    if(keys.w) inputVec.z -= 1;
    if(keys.s) inputVec.z += 1;
    if(keys.a) inputVec.x -= 1;
    if(keys.d) inputVec.x += 1;
    
    if(inputVec.lengthSq() > 0) {
        inputVec.normalize();
        inputVec.applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
    }

    if(isGrounded) {
        // Snappy movement relative to truck
        let targetVX = contactVelocity.x + inputVec.x * speed;
        let targetVZ = contactVelocity.z + inputVec.z * speed;
        
        playerBody.velocity.x += (targetVX - playerBody.velocity.x) * 0.4;
        playerBody.velocity.z += (targetVZ - playerBody.velocity.z) * 0.4;
        
        // Auto-Jump (if holding space)
        if(keys.space) {
            playerBody.velocity.y = 22; // High jump
        }
    } else {
        // Nerfed Air Control
        if(inputVec.lengthSq() > 0) {
            playerBody.applyForce(new CANNON.Vec3(inputVec.x * 600, 0, inputVec.z * 600), playerBody.position);
        }
        
        // Let player keep momentum in the air like true Clustertruck
        playerBody.velocity.x *= 0.998;
        playerBody.velocity.z *= 0.998;
    }

    // Camera follow
    camera.position.set(playerBody.position.x, playerBody.position.y + 0.6, playerBody.position.z);
    
    // === VFX: Speed effects ===
    const playerSpeedZ = playerBody.velocity.z;
    const playerSpeedTotal = Math.sqrt(playerBody.velocity.x**2 + playerBody.velocity.z**2);
    vfxMgr.updateFOV(camera, playerSpeedTotal, dt);
    vfxMgr.updateWindStreaks(playerBody.position, playerSpeedTotal, dt);
    vfxMgr.updateExplosions(dt);
    
    // === Audio: Update engine pitch ===
    audioMgr.updateEngineHum(playerSpeedTotal);

    // 4. Game Rules Check
    if(playerBody.position.y <= LAVA_Y + 1) {
        die();
    }
    
    if(mode === 'campaign') {
        if(playerBody.position.z <= goalZ + 5) {
            win();
        }
    } else if (mode === 'infinite') {
        fillInfiniteTrucks();
        let dist = Math.floor(Math.abs(playerBody.position.z));
        if(dist > distanceTraveled) distanceTraveled = dist;
        // Cleanup old trucks behind player
        cleanOldTrucks();
    }
    
    // Update HUD
    const hud = document.getElementById('hud');
    if(mode === 'campaign') {
        let distLeft = Math.max(0, Math.floor(playerBody.position.z - goalZ));
        hud.innerHTML = `Level: ${currentLevel}<br>Distance to Goal: ${distLeft}m`;
    } else {
        hud.innerHTML = `Mode: Infinite<br>Score: ${distanceTraveled}`;
    }
}

function cleanOldTrucks() {
    for(let i = trucks.length-1; i >= 0; i--) {
        let t = trucks[i];
        if(t.cab.position.z > playerBody.position.z + 100) {
            // Remove
            world.removeBody(t.cab);
            scene.remove(t.meshGrp);
            trucks.splice(i, 1);
        }
    }
}

// === EXPLOSION SYSTEM ===
function explodeTruck(t) {
    if(t.exploded) return;
    t.exploded = true;
    t.explodeTimer = 2.0; // Remove after 2s
    
    // Disable forward drive
    t.speed = 0;
    
    // Launch upward/outward
    t.cab.fixedRotation = false; // Allow tumbling for explosion
    t.cab.velocity.set(
        (Math.random()-0.5) * 15,
        15 + Math.random() * 10,
        (Math.random()-0.5) * 10
    );
    t.cab.angularVelocity.set(
        (Math.random()-0.5) * 8,
        (Math.random()-0.5) * 8,
        (Math.random()-0.5) * 8
    );
    
    // Spawn fire/explosion particles
    vfxMgr.spawnExplosion(new THREE.Vector3(
        t.cab.position.x, t.cab.position.y + 2, t.cab.position.z
    ));
    
    // Tint truck orange/red
    t.meshGrp.traverse(child => {
        if(child.isMesh && child.material) {
            child.material = new THREE.MeshBasicMaterial({ 
                color: 0xff4400, transparent: true, opacity: 0.8 
            });
        }
    });
}

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.1);
    
    updatePhysics(dt);
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// Start in Menu
init();

</script>
</body>
