<style>
:root {
  --bg-primary: #0A0612;
  --bg-secondary: #130D24;
  --surface: #1A102E;
  --surface-hover: #241840;
  --border: rgba(168, 85, 247, 0.2);
  --border-hover: rgba(168, 85, 247, 0.5);
  --text-primary: #F5F3FF;
  --text-secondary: #A78BFA;
  --accent: #A855F7;
  --accent-light: #C084FC;
  --accent-glow: rgba(168, 85, 247, 0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 3D PERSPECTIVE GRID BACKGROUND */
.bg-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  perspective: 1000px;
  overflow: hidden;
  z-index: 0;
}

.bg-grid {
  position: absolute;
  width: 200%;
  height: 200%;
  left: -50%;
  top: -50%;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 80px 80px;
  transform: rotateX(60deg) rotateZ(-45deg);
  transform-origin: center center;
  animation: gridMove 30s linear infinite;
  opacity: 0.3;
}

@keyframes gridMove {
  0% { transform: rotateX(60deg) rotateZ(-45deg) translateY(0); }
  100% { transform: rotateX(60deg) rotateZ(-45deg) translateY(80px); }
}

/* 3D FLOATING CUBES */
.cube {
  position: absolute;
  width: 60px;
  height: 60px;
  transform-style: preserve-3d;
  animation: cubeFloat 8s ease-in-out infinite;
}

.cube-face {
  position: absolute;
  width: 60px;
  height: 60px;
  border: 1px solid var(--accent);
  background: rgba(168, 85, 247, 0.08);
  backdrop-filter: blur(4px);
}

.cube-face.front { transform: translateZ(30px); }
.cube-face.back { transform: translateZ(-30px) rotateY(180deg); }
.cube-face.left { transform: translateX(-30px) rotateY(-90deg); }
.cube-face.right { transform: translateX(30px) rotateY(90deg); }
.cube-face.top {
  transform: translateY(-30px) rotateX(90deg);
  background: rgba(168, 85, 247, 0.15);
}
.cube-face.bottom {
  transform: translateY(30px) rotateX(-90deg);
  background: rgba(168, 85, 247, 0.05);
}

.cube-1 {
  top: 15%;
  left: 10%;
  animation-delay: 0s;
}

.cube-2 {
  top: 60%;
  right: 15%;
  transform: scale(0.7);
  animation-delay: -3s;
}

.cube-3 {
  bottom: 20%;
  left: 20%;
  transform: scale(0.5);
  animation-delay: -5s;
}

.cube-4 {
  top: 30%;
  right: 25%;
  transform: scale(0.8);
  animation-delay: -2s;
}

@keyframes cubeFloat {
  0%, 100% {
    transform: translateY(0) rotateX(0deg) rotateY(0deg);
  }
  25% {
    transform: translateY(-20px) rotateX(10deg) rotateY(10deg);
  }
  50% {
    transform: translateY(-10px) rotateX(5deg) rotateY(-5deg);
  }
  75% {
    transform: translateY(-25px) rotateX(-10deg) rotateY(5deg);
  }
}

.transformed .cube {
  animation: cubeExplode 0.7s cubic-bezier(0.55, 0, 1, 0.45) forwards;
}

@keyframes cubeExplode {
  0% { transform: scale(1) rotateX(0deg) rotateY(0deg); opacity: 1; }
  30% { transform: scale(1.4) rotateX(90deg) rotateY(90deg); opacity: 0.8; filter: brightness(3); }
  100% { transform: scale(0) rotateX(360deg) rotateY(360deg); opacity: 0; }
}

#three-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease;
}

.transformed #three-canvas {
  opacity: 1;
}

.try-btn-ripple {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168, 85, 247, 0.3), transparent 70%);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 5;
}

.try-btn-ripple.active {
  animation: rippleExpand 1.2s cubic-bezier(0, 0.5, 0.5, 1) forwards;
}

@keyframes rippleExpand {
  0% { width: 0; height: 0; opacity: 0.8; }
  100% { width: 300vw; height: 300vw; opacity: 0; }
}

/* 3D GLOWING ORBS */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.4;
  animation: orbPulse 6s ease-in-out infinite;
}

.orb-1 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(124, 58, 237, 0.5) 0%, transparent 70%);
  top: -100px;
  left: -100px;
  animation-delay: 0s;
}

.orb-2 {
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, transparent 70%);
  bottom: -50px;
  right: -50px;
  animation-delay: -2s;
}

.orb-3 {
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(192, 132, 252, 0.3) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -4s;
}

@keyframes orbPulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.4;
  }
  50% {
    transform: scale(1.2);
    opacity: 0.6;
  }
}

/* FLOATING PARTICLES */
.bg-particles {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(2px 2px at 10% 20%, rgba(168, 85, 247, 0.5), transparent),
    radial-gradient(2px 2px at 30% 60%, rgba(168, 85, 247, 0.4), transparent),
    radial-gradient(3px 3px at 50% 10%, rgba(192, 132, 252, 0.6), transparent),
    radial-gradient(2px 2px at 70% 40%, rgba(168, 85, 247, 0.5), transparent),
    radial-gradient(2px 2px at 90% 80%, rgba(168, 85, 247, 0.4), transparent),
    radial-gradient(3px 3px at 15% 85%, rgba(124, 58, 237, 0.6), transparent),
    radial-gradient(2px 2px at 45% 45%, rgba(192, 132, 252, 0.4), transparent),
    radial-gradient(2px 2px at 85% 15%, rgba(168, 85, 247, 0.5), transparent);
  pointer-events: none;
  z-index: 1;
  animation: floatParticles 20s ease-in-out infinite;
}

@keyframes floatParticles {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(10, 6, 18, 0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 32px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  text-decoration: none;
  letter-spacing: -0.02em;
}

.logo span {
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 36px;
}

.nav-links a {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.2s;
  position: relative;
}

.nav-links a:hover, .nav-links a.active {
  color: var(--text-primary);
}

.try-btn {
  padding: 8px 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  border-radius: 10px;
  font-weight: 600;
  color: #fff;
  transition: all 0.3s ease;
}

.try-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
  color: #fff;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width 0.3s ease;
}

.nav-links a:hover::after, .nav-links a.active::after {
  width: 100%;
}

/* SEARCH */
.search-box {
  position: relative;
}

.search-box input {
  width: 260px;
  padding: 10px 16px 10px 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: inherit;
  font-size: 0.875rem;
  color: var(--text-primary);
  transition: all 0.25s ease;
}

.search-box input::placeholder {
  color: var(--text-secondary);
}

.search-box input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
  width: 300px;
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  pointer-events: none;
}

.search-results {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  max-height: 320px;
  overflow-y: auto;
  display: none;
  z-index: 200;
}

.search-results.active {
  display: block;
}

.search-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  text-decoration: none;
  color: var(--text-primary);
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.search-item:last-child { border-bottom: none; }
.search-item:hover { background: var(--surface-hover); }

.search-item img {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  object-fit: cover;
}

/* MAIN */
.main {
  padding-top: 72px;
  position: relative;
  z-index: 1;
}

/* HERO */
.hero {
  padding: 100px 32px 80px;
  text-align: center;
  position: relative;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(168, 85, 247, 0.2) 0%, transparent 70%);
  pointer-events: none;
}

.hero h1 {
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  font-size: 1.1rem;
  color: var(--text-secondary);
  max-width: 450px;
  margin: 0 auto 40px;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 64px;
}

.stat-number {
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-label {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 4px;
}

/* CATEGORIES */
.categories {
  padding: 0 32px 60px;
  max-width: 1400px;
  margin: 0 auto;
}

.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
  margin-bottom: 20px;
}

.category-grid {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.cat-btn {
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: inherit;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text-primary);
  text-decoration: none;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cat-btn:hover {
  background: var(--surface-hover);
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(168, 85, 247, 0.2);
}

.cat-btn svg {
  width: 18px;
  height: 18px;
  stroke: var(--accent);
  stroke-width: 2;
  fill: none;
}

/* GAMES */
.games-section {
  padding: 0 32px 100px;
  max-width: 1400px;
  margin: 0 auto;
}

.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  animation: fadeUp 0.5s ease backwards;
}

.game-card:nth-child(1) { animation-delay: 0.05s; }
.game-card:nth-child(2) { animation-delay: 0.08s; }
.game-card:nth-child(3) { animation-delay: 0.11s; }
.game-card:nth-child(4) { animation-delay: 0.14s; }
.game-card:nth-child(5) { animation-delay: 0.17s; }
.game-card:nth-child(6) { animation-delay: 0.2s; }
.game-card:nth-child(7) { animation-delay: 0.23s; }
.game-card:nth-child(8) { animation-delay: 0.26s; }
.game-card:nth-child(9) { animation-delay: 0.29s; }
.game-card:nth-child(10) { animation-delay: 0.32s; }
.game-card:nth-child(11) { animation-delay: 0.35s; }
.game-card:nth-child(12) { animation-delay: 0.38s; }

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.game-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: var(--accent);
  box-shadow: 0 20px 50px rgba(168, 85, 247, 0.25), 0 0 30px rgba(168, 85, 247, 0.15);
}

.game-thumb {
  aspect-ratio: 16/10;
  overflow: hidden;
  background: var(--bg-secondary);
}

.game-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.game-card:hover .game-thumb img {
  transform: scale(1.1);
}

.game-info {
  padding: 16px;
  position: relative;
}

.game-info::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(to bottom, rgba(168, 85, 247, 0.1), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.game-card:hover .game-info::before {
  opacity: 1;
}

.game-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  position: relative;
  z-index: 1;
}

.game-cat {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 2px;
  position: relative;
  z-index: 1;
}

/* FOOTER */
.footer {
  padding: 40px 32px;
  text-align: center;
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.footer p {
  font-size: 0.8125rem;
  color: var(--text-secondary);
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .header-inner {
    padding: 0 16px;
  }

  .nav-links {
    display: none;
  }

  .hero {
    padding: 70px 16px 50px;
  }

  .hero-stats {
    gap: 32px;
  }

  .stat-number {
    font-size: 2rem;
  }

  .categories, .games-section {
    padding-left: 16px;
    padding-right: 16px;
  }

  .games-grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
  }
}
</style>
</head>

games.forEach(g => {
  const card = document.createElement('a');
  card.href = 'play/' + g.file + '.html';
  card.className = 'game-card';
  card.innerHTML = '<div class="game-thumb"><img src="images/' + g.img + '" alt="' + g.name + '"></div><div class="game-info"><div class="game-title">' + g.name + '</div><div class="game-cat">' + g.cat + '</div></div>';
  grid.appendChild(card);
});

const input = document.getElementById('searchInput');
const results = document.getElementById('searchResults');

input.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (q.length < 2) { results.classList.remove('active'); return; }
  const found = games.filter(g => g.name.toLowerCase().includes(q));
  if (found.length === 0) { results.classList.remove('active'); return; }
  results.innerHTML = found.map(g =>
    '<a href="play/' + g.file + '.html" class="search-item">' +
    '<img src="images/' + g.img + '" alt="' + g.name + '">' +
    '<span>' + g.name + '</span></a>'
  ).join('');
  results.classList.add('active');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-box')) results.classList.remove('active');
});

// Shape transformation toggle
const tryBtn = document.getElementById('tryBtn');
const bgContainer = document.querySelector('.bg-container');

tryBtn.addEventListener('click', function() {
  const isTransformed = bgContainer.classList.toggle('transformed');
  tryBtn.textContent = isTransformed ? 'Назад' : 'Попробуй';
  if (isTransformed) {
    const ripple = document.createElement('div');
    ripple.className = 'try-btn-ripple';
    document.body.appendChild(ripple);
    requestAnimationFrame(() => ripple.classList.add('active'));
    setTimeout(() => ripple.remove(), 1300);
  }
  if (typeof window._toggleThreeShapes === 'function') {
    window._toggleThreeShapes(isTransformed);
  }
});
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 14);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.8, 0.4, 0.1
);
composer.addPass(bloom);

scene.add(new THREE.AmbientLight(0x1a0030, 0.8));
const dirLight = new THREE.DirectionalLight(0xc084fc, 1.5);
dirLight.position.set(5, 8, 5);
scene.add(dirLight);
const pointLight1 = new THREE.PointLight(0xa855f7, 3, 30);
pointLight1.position.set(-5, 3, 5);
scene.add(pointLight1);
const pointLight2 = new THREE.PointLight(0xe879f9, 2, 25);
pointLight2.position.set(5, -2, 3);
scene.add(pointLight2);

const shapes = [];
const shapeData = [
  { geo: new THREE.OctahedronGeometry(1.2, 0), pos: [-5, 3, -2], color: 0xa855f7, emissive: 0x7c3aed, speed: 0.8, scale: 1.0 },
  { geo: new THREE.TetrahedronGeometry(1.4, 0), pos: [4.5, -2, -1], color: 0xc084fc, emissive: 0x9333ea, speed: 1.0, scale: 1.1 },
  { geo: new THREE.IcosahedronGeometry(1.0, 0), pos: [-3, -3, 0], color: 0xe879f9, emissive: 0xc026d3, speed: 0.6, scale: 0.9 },
  { geo: new THREE.DodecahedronGeometry(1.1, 0), pos: [5, 2.5, -3], color: 0xd946ef, emissive: 0xa21caf, speed: 0.7, scale: 1.0 },
  { geo: new THREE.TorusKnotGeometry(0.7, 0.25, 80, 16, 2, 3), pos: [0, 4, -2], color: 0xf0abfc, emissive: 0xd946ef, speed: 0.5, scale: 0.85 },
  { geo: new THREE.TorusGeometry(0.9, 0.35, 16, 40), pos: [-4, 0, -1], color: 0x8b5cf6, emissive: 0x6d28d9, speed: 0.9, scale: 1.0 },
  { geo: new THREE.ConeGeometry(0.9, 1.8, 4), pos: [2, -4, 0], color: 0xfbbf24, emissive: 0xf59e0b, speed: 1.1, scale: 0.95 },
  { geo: new THREE.OctahedronGeometry(0.8, 1), pos: [6, -0.5, -2], color: 0x34d399, emissive: 0x059669, speed: 0.75, scale: 0.8 },
];

shapeData.forEach((d, i) => {
  const mat = new THREE.MeshPhysicalMaterial({
    color: d.color,
    emissive: d.emissive,
    emissiveIntensity: 0.8,
    metalness: 0.4,
    roughness: 0.2,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1,
    transparent: true,
    opacity: 0,
  });

  const wireMat = new THREE.MeshBasicMaterial({
    color: d.color,
    wireframe: true,
    transparent: true,
    opacity: 0,
  });

  const mesh = new THREE.Mesh(d.geo, mat);
  const wireMesh = new THREE.Mesh(d.geo.clone(), wireMat);
  wireMesh.scale.setScalar(1.08);

  const group = new THREE.Group();
  group.add(mesh);
  group.add(wireMesh);
  group.position.set(...d.pos);
  group.scale.setScalar(0.01);
  scene.add(group);

  shapes.push({
    group, mesh, wireMesh, mat, wireMat,
    basePos: [...d.pos],
    speed: d.speed,
    targetScale: d.scale,
    delay: i * 0.12,
    phase: Math.random() * Math.PI * 2,
  });
});

let isActive = false;
let animating = false;
let morphProgress = 0;
const clock = new THREE.Clock();

window._toggleThreeShapes = function(active) {
  isActive = active;
  animating = true;
  morphProgress = 0;
};

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  if (animating) {
    morphProgress += delta * 1.5;
    if (morphProgress >= 1) {
      morphProgress = 1;
      animating = false;
    }
  }

  const ease = morphProgress < 1
    ? 1 - Math.pow(1 - morphProgress, 3)
    : 1;

  shapes.forEach((s, i) => {
    const delayedEase = Math.max(0, Math.min(1, (ease - s.delay) / (1 - s.delay)));
    const springEase = delayedEase < 1
      ? 1 - Math.pow(1 - delayedEase, 3) * Math.cos(delayedEase * Math.PI * 1.5)
      : 1;

    if (isActive) {
      s.mat.opacity = springEase;
      s.wireMat.opacity = springEase * 0.3;
      s.group.scale.setScalar(s.targetScale * springEase);
    } else {
      const fallEase = 1 - Math.pow(delayedEase, 2);
      s.mat.opacity = fallEase;
      s.wireMat.opacity = fallEase * 0.3;
      s.group.scale.setScalar(s.targetScale * (1 - fallEase) + 0.01);
    }

    if (s.group.scale.x > 0.05) {
      s.group.rotation.x += delta * s.speed * 0.7;
      s.group.rotation.y += delta * s.speed;
      s.group.rotation.z += delta * s.speed * 0.3;

      s.group.position.x = s.basePos[0] + Math.sin(elapsed * s.speed + s.phase) * 0.5;
      s.group.position.y = s.basePos[1] + Math.cos(elapsed * s.speed * 0.8 + s.phase) * 0.7;
      s.group.position.z = s.basePos[2] + Math.sin(elapsed * s.speed * 0.5 + s.phase * 2) * 0.3;
    }
  });

  pointLight1.position.x = Math.sin(elapsed * 0.5) * 6;
  pointLight1.position.y = Math.cos(elapsed * 0.3) * 4;
  pointLight2.position.x = Math.cos(elapsed * 0.4) * 5;
  pointLight2.position.z = Math.sin(elapsed * 0.6) * 4;

  if (isActive || morphProgress > 0) {
    composer.render();
  }
}

animate();

window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});
</script>
