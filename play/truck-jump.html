<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truck Jump</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#87CEEB;font-family:'Segoe UI',Arial,sans-serif}
canvas{display:block}
#game-ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;display:none}
#level-name{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:bold;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);letter-spacing:3px;transition:opacity 1s}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.3)}
#crosshair::before{width:2px;height:16px;left:7px}
#crosshair::after{width:16px;height:2px;top:7px}
#hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
#menu-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#4a90d9 0%,#2a5a9a 50%,#1a3a6a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:all}
#menu-screen h1{font-size:56px;color:#fff;margin-bottom:6px;text-shadow:0 3px 8px rgba(0,0,0,.3);letter-spacing:2px}
#menu-screen h2{font-size:16px;color:#aaccff;margin-bottom:18px;font-weight:normal}
.menu-btn{background:#fff;border:none;color:#333;font-size:16px;font-weight:bold;padding:12px 36px;border-radius:8px;cursor:pointer;pointer-events:all;transition:all .2s;letter-spacing:1px;min-width:230px;margin:4px;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.menu-btn:hover{transform:scale(1.05);background:#f0f0f0}
.menu-btn.secondary{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.3)}
.controls-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 20px;margin-bottom:14px}
.controls-box p{color:#ccddff;font-size:13px;margin:3px 0}
.controls-box span{color:#ffaa44;font-weight:bold}
#death-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:all}
#death-screen h1{font-size:48px;color:#ff4444;margin-bottom:10px;text-shadow:0 0 15px rgba(255,0,0,.5)}
#death-screen .fs{font-size:22px;color:#fff;margin-bottom:18px}
#death-buttons{display:flex;gap:10px}
#complete-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,80,0,.5);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:all}
#complete-screen h1{font-size:42px;color:#44ff88;margin-bottom:8px;text-shadow:0 0 15px rgba(0,255,100,.5)}
#complete-screen .info{font-size:17px;color:#fff;margin-bottom:14px}
#level-select{display:none;flex-direction:column;align-items:center;gap:6px;margin:8px 0;max-height:200px;overflow-y:auto;padding:6px}
.lv-item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:8px 18px;color:#fff;font-size:13px;cursor:pointer;pointer-events:all;transition:all .15s;min-width:200px;text-align:center}
.lv-item:hover{background:rgba(255,255,255,.15)}
.lv-item.locked{opacity:.3;cursor:not-allowed}
.lv-item.done{border-color:#44ff88}
</style>
</head>
<body>

<div id="menu-screen">
  <h1>TRUCK JUMP</h1>
  <h2>Прыгай по грузовикам!</h2>
  <div class="controls-box">
    <p><span>WASD</span> — Движение</p>
    <p><span>SPACE</span> — Прыжок</p>
    <p><span>SHIFT</span> — Рывок</p>
    <p><span>МЫШЬ</span> — Обзор</p>
  </div>
  <button class="menu-btn" id="btn-endless">БЕСКОНЕЧНЫЙ</button>
  <button class="menu-btn secondary" id="btn-levels">УРОВНИ</button>
  <div id="level-select"></div>
</div>

<div id="death-screen">
  <h1>УПАЛ!</h1>
  <div class="fs">Счёт: <span id="final-score">0</span></div>
  <div id="death-buttons">
    <button class="menu-btn" id="btn-restart">ЗАНОВО</button>
    <button class="menu-btn secondary" id="btn-menu1">МЕНЮ</button>
  </div>
</div>

<div id="complete-screen">
  <h1>УРОВЕНЬ ПРОЙДЕН!</h1>
  <div class="info" id="complete-info"></div>
  <button class="menu-btn" id="btn-next">СЛЕДУЮЩИЙ</button>
  <button class="menu-btn secondary" id="btn-menu2">МЕНЮ</button>
</div>

<div id="game-ui">
  <div id="level-name"></div>
  <div id="crosshair"></div>
  <div id="hint">Нажми чтобы начать</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';
import { VignetteShader } from 'three/addons/shaders/VignetteShader.js';

const TW = 3, TH = 2.5, TL = [10, 12, 14];
const G = -28, JF = 13, MS = 7, DF = 14;
const LANE_W = 5;

const LEVELS = [
  { n: 'Уровень 1', t: 10, s: 7, g: 6, l: 1 },
  { n: 'Уровень 2', t: 12, s: 7, g: 6, l: 2 },
  { n: 'Уровень 3', t: 14, s: 8, g: 6, l: 3 },
  { n: 'Уровень 4', t: 15, s: 9, g: 5, l: 3 },
  { n: 'Уровень 5', t: 16, s: 10, g: 5, l: 3 },
  { n: 'Уровень 6', t: 18, s: 11, g: 5, l: 3 },
  { n: 'Уровень 7', t: 20, s: 12, g: 4, l: 3 },
  { n: 'Уровень 8', t: 22, s: 13, g: 4, l: 3 },
  { n: 'Уровень 9', t: 25, s: 14, g: 4, l: 3 },
  { n: 'Уровень 10', t: 30, s: 15, g: 3, l: 3 },
];

let scene, camera, renderer, controls, clock;
let composer;
let player, pv, onGround;
let trucks = [], particles = [];
let audio, keys = {};
let mode = 'endless', cLevel = 0, score = 0, best = +localStorage.getItem('tjB') || 0;
let lj = 0, lt = 0, active = false, ct = null, gameTime = 0;

function init() {
  clock = new THREE.Clock();

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.FogExp2(0x87CEEB, 0.004);

  camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 500);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  controls = new PointerLockControls(camera, document.body);
  controls.addEventListener('lock', () => { document.getElementById('hint').style.display = 'none'; });
  controls.addEventListener('unlock', () => {
    if (active) document.getElementById('hint').style.display = 'block';
  });

  setupLights();
  setupPP();
  createWorld();
  audio = new Audio();
  setupInput();
  buildLS();
  animate();
}

function setupLights() {
  scene.add(new THREE.HemisphereLight(0x88bbdd, 0x445522, 0.8));
  scene.add(new THREE.AmbientLight(0x667788, 0.7));

  const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
  sun.position.set(20, 50, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 120;
  sun.shadow.camera.left = -50; sun.shadow.camera.right = 50;
  sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50;
  sun.shadow.bias = -0.0001;
  scene.add(sun);
}

function setupPP() {
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bp = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.2, 0.3, 0.9);
  composer.addPass(bp);
  const vp = new ShaderPass(VignetteShader);
  vp.uniforms['offset'].value = 1.4; vp.uniforms['darkness'].value = 0.5;
  composer.addPass(vp);
  const fp = new ShaderPass(FXAAShader);
  fp.material.uniforms['resolution'].value.set(
    1 / (innerWidth * renderer.getPixelRatio()),
    1 / (innerHeight * renderer.getPixelRatio())
  );
  composer.addPass(fp);
}

function createWorld() {
  // Ground - dark surface far below
  const gg = new THREE.PlaneGeometry(400, 1200);
  const gm = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.95 });
  const ground = new THREE.Mesh(gg, gm);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -10;
  ground.position.z = -300;
  ground.receiveShadow = true;
  scene.add(ground);

  // Clouds
  for (let i = 0; i < 30; i++) {
    const cg = new THREE.SphereGeometry(5 + Math.random() * 10, 8, 6);
    const cm = new THREE.MeshStandardMaterial({
      color: 0xffffff, transparent: true, opacity: 0.4, roughness: 1
    });
    const c = new THREE.Mesh(cg, cm);
    c.position.set(
      (Math.random() - 0.5) * 200,
      30 + Math.random() * 40,
      (Math.random() - 0.5) * 500
    );
    c.scale.set(1 + Math.random() * 0.5, 0.3 + Math.random() * 0.2, 1 + Math.random() * 0.5);
    scene.add(c);
  }

  // Distant buildings
  for (let i = 0; i < 60; i++) {
    const h = 5 + Math.random() * 25;
    const bg = new THREE.BoxGeometry(3 + Math.random() * 8, h, 3 + Math.random() * 8);
    const bm = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.6, 0.1, 0.25 + Math.random() * 0.15),
      roughness: 0.9
    });
    const b = new THREE.Mesh(bg, bm);
    const a = Math.random() * Math.PI * 2;
    const d = 60 + Math.random() * 80;
    b.position.set(Math.cos(a) * d, h / 2 - 10, Math.sin(a) * d - 100);
    scene.add(b);
  }
}

// Белый американский тягач
function createTruck(x, z, length, speed, lane) {
  const group = new THREE.Group();

  // Trailer - белый
  const trailerLen = length - 2.5;
  const tg = new THREE.BoxGeometry(TW, TH, trailerLen);
  const tm = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.5, metalness: 0.3 });
  const trailer = new THREE.Mesh(tg, tm);
  trailer.position.set(0, TH / 2 + 0.3, -0.5);
  trailer.castShadow = true;
  trailer.receiveShadow = true;
  group.add(trailer);

  // Trailer bottom frame
  const fg = new THREE.BoxGeometry(TW - 0.2, 0.3, trailerLen);
  const fm = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7, metalness: 0.5 });
  const frame = new THREE.Mesh(fg, fm);
  frame.position.set(0, 0.3, -0.5);
  group.add(frame);

  // Cabin (кабина тягача)
  const cg = new THREE.BoxGeometry(TW - 0.2, TH * 0.8, 2.5);
  const cm = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.4, metalness: 0.4 });
  const cab = new THREE.Mesh(cg, cm);
  cab.position.set(0, TH * 0.4 + 0.3, length / 2 - 1.25);
  cab.castShadow = true;
  group.add(cab);

  // Cabin top deflector
  const dg = new THREE.BoxGeometry(TW - 0.4, 0.4, 1.5);
  const deflector = new THREE.Mesh(dg, cm);
  deflector.position.set(0, TH * 0.8 + 0.5, length / 2 - 1.25);
  group.add(deflector);

  // Windshield
  const wg = new THREE.PlaneGeometry(TW - 0.6, 0.9);
  const wm = new THREE.MeshStandardMaterial({
    color: 0x88bbdd, emissive: 0x224466, emissiveIntensity: 0.15,
    roughness: 0.05, metalness: 0.9, transparent: true, opacity: 0.5
  });
  const ws = new THREE.Mesh(wg, wm);
  ws.position.set(0, TH * 0.5 + 0.5, length / 2 - 0.01);
  group.add(ws);

  // Grill
  const gg2 = new THREE.PlaneGeometry(TW - 0.8, 0.6);
  const gm2 = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6, metalness: 0.7 });
  const grill = new THREE.Mesh(gg2, gm2);
  grill.position.set(0, TH * 0.2 + 0.3, length / 2 + 0.01);
  group.add(grill);

  // Headlights
  const hg = new THREE.SphereGeometry(0.12, 6, 6);
  const hm = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffaa, emissiveIntensity: 0.8 });
  [-1, 1].forEach(s => {
    const h = new THREE.Mesh(hg, hm);
    h.position.set(s * (TW / 2 - 0.5), TH * 0.2 + 0.3, length / 2 + 0.05);
    group.add(h);
  });

  // Bumper
  const bg2 = new THREE.BoxGeometry(TW - 0.2, 0.3, 0.3);
  const bm2 = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.6 });
  const bumper = new THREE.Mesh(bg2, bm2);
  bumper.position.set(0, 0.3, length / 2 + 0.15);
  group.add(bumper);

  // Wheels
  const whg = new THREE.CylinderGeometry(0.5, 0.5, 0.3, 12);
  const whm = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 });
  const wheelPositions = [
    [-TW / 2 - 0.15, 0.5, length / 2 - 2],
    [TW / 2 + 0.15, 0.5, length / 2 - 2],
    [-TW / 2 - 0.15, 0.5, -length / 2 + 2],
    [TW / 2 + 0.15, 0.5, -length / 2 + 2],
    [-TW / 2 - 0.15, 0.5, -length / 2 + 3.2],
    [TW / 2 + 0.15, 0.5, -length / 2 + 3.2],
  ];
  wheelPositions.forEach(p => {
    const w = new THREE.Mesh(whg, whm);
    w.rotation.z = Math.PI / 2;
    w.position.set(...p);
    group.add(w);
  });

  group.position.set(x, 0, z);
  scene.add(group);

  return {
    mesh: group,
    speed: speed,
    length: length,
    width: TW,
    height: TH + 0.3,
    lane: lane,
    jumped: false,
    vx: 0,
    vz: 0,
  };
}

function createPlayer() {
  const g = new THREE.Group();
  const bg = new THREE.CapsuleGeometry(0.3, 0.6, 4, 8);
  const bm = new THREE.MeshStandardMaterial({
    color: 0x222222, emissive: 0x111111, emissiveIntensity: 0.1,
    roughness: 0.4, metalness: 0.3
  });
  const b = new THREE.Mesh(bg, bm);
  b.position.y = 0.6;
  b.castShadow = true;
  g.add(b);
  scene.add(g);
  return g;
}

function createParticles(pos, color, count) {
  for (let i = 0; i < count; i++) {
    const g = new THREE.SphereGeometry(0.05 + Math.random() * 0.05, 4, 4);
    const m = new THREE.MeshBasicMaterial({ color });
    const p = new THREE.Mesh(g, m);
    p.position.copy(pos);
    scene.add(p);
    particles.push({
      mesh: p,
      vel: new THREE.Vector3((Math.random() - .5) * 8, Math.random() * 5 + 1, (Math.random() - .5) * 8),
      life: 1, decay: 2 + Math.random()
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vel.y -= 12 * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.life -= p.decay * dt;
    p.mesh.material.opacity = Math.max(0, p.life);
    p.mesh.material.transparent = true;
    p.mesh.scale.setScalar(p.life);
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }
}

function clearScene() {
  trucks.forEach(t => scene.remove(t.mesh));
  trucks = [];
  particles.forEach(p => scene.remove(p.mesh));
  particles = [];
  if (player) scene.remove(player);
  ct = null;
}

// ===================== GAME START =====================

function startEndless() {
  mode = 'endless';
  hideAll();
  clearScene();

  player = createPlayer();
  pv = new THREE.Vector3(0, 0, 0);
  onGround = true;
  score = 0; lj = 0; lt = 999;
  gameTime = 0;
  active = true;

  let z = -6;
  for (let i = 0; i < 15; i++) {
    const lane = Math.floor(Math.random() * 3) - 1;
    const x = lane * LANE_W;
    const len = TL[Math.floor(Math.random() * TL.length)];
    const spd = 5 + Math.random() * 4;
    const truck = createTruck(x, z, len, spd, lane);
    trucks.push(truck);
    z -= len / 2 + 5 + Math.random() * 4 + len / 2;
  }

  const first = trucks[0];
  player.position.set(first.mesh.position.x, first.mesh.position.y + first.height + 0.4, first.mesh.position.z);
  ct = first;

  document.getElementById('game-ui').style.display = 'block';
  const ln = document.getElementById('level-name');
  ln.textContent = 'БЕСКОНЕЧНЫЙ';
  ln.style.opacity = '1';
  setTimeout(() => { ln.style.opacity = '0'; }, 2000);

  audio.init();
  setTimeout(() => { if (active) controls.lock(); }, 100);
}

function startLevel(idx) {
  mode = 'level';
  cLevel = idx;
  const lv = LEVELS[idx];
  hideAll();
  clearScene();

  player = createPlayer();
  pv = new THREE.Vector3(0, 0, 0);
  onGround = true;
  score = 0; lj = 0; lt = lv.t;
  gameTime = 0;
  active = true;

  let z = -6;
  for (let i = 0; i < lv.t; i++) {
    const lane = lv.l === 1 ? 0 : (Math.floor(Math.random() * lv.l) - Math.floor(lv.l / 2));
    const x = lane * LANE_W;
    const len = TL[Math.floor(Math.random() * TL.length)];
    const spd = lv.s * (0.85 + Math.random() * 0.3);
    const truck = createTruck(x, z, len, spd, lane);
    trucks.push(truck);
    z -= len / 2 + lv.g + len / 2;
  }

  const first = trucks[0];
  player.position.set(first.mesh.position.x, first.mesh.position.y + first.height + 0.4, first.mesh.position.z);
  ct = first;

  document.getElementById('game-ui').style.display = 'block';
  const ln = document.getElementById('level-name');
  ln.textContent = lv.n;
  ln.style.opacity = '1';
  setTimeout(() => { ln.style.opacity = '0'; }, 2500);

  audio.init();
  setTimeout(() => { if (active) controls.lock(); }, 100);
}

function hideAll() {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('complete-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'none';
}

function die() {
  active = false;
  audio.playDeathSound();
  controls.unlock();

  const fs = Math.floor(score);
  if (fs > best) { best = fs; localStorage.setItem('tjB', fs.toString()); }

  document.getElementById('final-score').textContent = fs;
  document.getElementById('death-screen').style.display = 'flex';

  createParticles(player.position, 0xff4444, 20);
}

function completeLevel() {
  active = false;
  controls.unlock();

  document.getElementById('complete-info').textContent = `Грузовиков: ${lj} / ${lt}`;
  document.getElementById('complete-screen').style.display = 'flex';
}

function goToMenu() {
  hideAll();
  document.getElementById('menu-screen').style.display = 'flex';
  document.getElementById('game-ui').style.display = 'none';
  clearScene();
  active = false;
}

// ===================== CONTROLS =====================

function setupInput() {
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  document.getElementById('btn-endless').onclick = startEndless;
  document.getElementById('btn-levels').onclick = () => {
    const ls = document.getElementById('level-select');
    ls.style.display = ls.style.display === 'flex' ? 'none' : 'flex';
    buildLS();
  };
  document.getElementById('btn-restart').onclick = () => {
    document.getElementById('death-screen').style.display = 'none';
    if (mode === 'level') startLevel(cLevel); else startEndless();
  };
  document.getElementById('btn-menu1').onclick = goToMenu;
  document.getElementById('btn-menu2').onclick = goToMenu;

  renderer.domElement.onclick = () => { if (active) controls.lock(); };

  window.onresize = () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  };
}

function buildLS() {
  const ls = document.getElementById('level-select');
  ls.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const d = document.createElement('div');
    d.className = 'lv-item';
    const unlocked = i === 0 || true;
    if (!unlocked) d.classList.add('locked');
    d.textContent = `${i + 1}. ${lv.n}`;
    if (unlocked) d.onclick = () => startLevel(i);
    ls.appendChild(d);
  });
}

// ===================== COLLISION =====================

function checkLanding() {
  const pp = player.position;
  const pr = 0.4;

  for (const t of trucks) {
    const tp = t.mesh.position;
    const hl = t.length / 2;
    const hw = t.width / 2;

    if (Math.abs(pp.x - tp.x) < hw + pr && Math.abs(pp.z - tp.z) < hl + pr) {
      const top = tp.y + t.height;
      const pb = pp.y - 0.3;
      if (pb >= top - 0.5 && pb <= top + 0.6 && pv.y <= 0.5) {
        return { truck: t, top };
      }
    }
  }
  return null;
}

// ===================== TRUCK PHYSICS =====================

function updateTruckPhysics(dt) {
  // Столкновения между грузовиками
  for (let i = 0; i < trucks.length; i++) {
    for (let j = i + 1; j < trucks.length; j++) {
      const a = trucks[i], b = trucks[j];
      if (a.lane !== b.lane) continue;

      const az = a.mesh.position.z;
      const bz = b.mesh.position.z;
      const aHalf = a.length / 2;
      const bHalf = b.length / 2;

      const overlap = (aHalf + bHalf) - Math.abs(az - bz);
      if (overlap > 0) {
        // Раздвигаем
        const push = overlap / 2 + 0.1;
        if (az > bz) {
          a.mesh.position.z += push;
          b.mesh.position.z -= push;
        } else {
          a.mesh.position.z -= push;
          b.mesh.position.z += push;
        }
      }
    }
  }
}

// ===================== MAIN LOOP =====================

function update() {
  const dt = Math.min(clock.getDelta(), 0.05);

  if (!active) {
    updateParticles(dt);
    composer.render();
    return;
  }

  gameTime += dt;
  score += dt * 10;

  // Camera direction
  const fwd = new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y = 0;
  fwd.normalize();
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();

  const md = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp']) md.add(fwd);
  if (keys['KeyS'] || keys['ArrowDown']) md.sub(fwd);
  if (keys['KeyA'] || keys['ArrowLeft']) md.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) md.add(right);
  if (md.length() > 0) md.normalize();

  // Jump
  if (keys['Space']) {
    if (onGround) {
      pv.y = JF;
      onGround = false;
      // При прыжке сохраняем полную инерцию грузовика
      // pv.z уже содержит скорость грузовика, просто отпускаем
      ct = null;
      audio.playJumpSound();
      createParticles(player.position, 0xffffff, 4);
      keys['Space'] = false;
    }
  }

  // Dash
  if (keys['ShiftLeft'] && onGround) {
    const dd = md.length() > 0 ? md.clone() : fwd.clone();
    pv.add(dd.multiplyScalar(DF));
    audio.playDashSound();
    createParticles(player.position, 0xffcc00, 6);
    keys['ShiftLeft'] = false;
  }

  // Physics
  pv.y += G * dt;

  // Управление движением (WASD)
  const inputX = md.x * MS;
  const inputZ = md.z * MS;

  if (onGround && ct) {
    // На грузовике: позиция = скорость грузовика + ввод
    pv.x = inputX;
    pv.z = -ct.speed + inputZ;
  } else {
    // В воздухе: инерция сохраняется, WASD добавляет небольшое управление
    pv.x += (inputX - pv.x) * 0.1;
    pv.z += inputZ * 0.15;
    // Очень лёгкое затухание только по X
    pv.x *= 0.98;
  }

  player.position.add(pv.clone().multiplyScalar(dt));

  if (md.length() > 0) {
    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, Math.atan2(md.x, md.z), 0.15);
  }

  // Landing
  const col = checkLanding();
  if (col) {
    if (!onGround && pv.y < 0) {
      if (!col.truck.jumped) {
        col.truck.jumped = true;
        lj++;
      }
      audio.playLandSound();
      createParticles(player.position, 0xcccccc, 4);

      if (mode === 'level' && lj >= lt) {
        setTimeout(() => completeLevel(), 400);
      }
    }
    player.position.y = col.top + 0.3;
    pv.y = 0;
    onGround = true;
    ct = col.truck;
  } else {
    onGround = false;
  }

  // Truck physics - collisions
  updateTruckPhysics(dt);

  // Move trucks FORWARD (-Z)
  for (let i = trucks.length - 1; i >= 0; i--) {
    const t = trucks[i];
    t.mesh.position.z -= t.speed * dt;

    if (t.mesh.position.z < player.position.z - 80) {
      scene.remove(t.mesh);
      trucks.splice(i, 1);
      if (ct === t) ct = null;
    }
  }

  // Spawn new in endless
  if (mode === 'endless') {
    let minZ = 0;
    for (const t of trucks) { if (t.mesh.position.z < minZ) minZ = t.mesh.position.z; }
    if (minZ > player.position.z - 150) {
      const lane = Math.floor(Math.random() * 3) - 1;
      const len = TL[Math.floor(Math.random() * TL.length)];
      const spd = 5 + Math.random() * 4;
      const z = minZ - len / 2 - 5 - Math.random() * 6;
      const truck = createTruck(lane * LANE_W, z, len, spd, lane);
      trucks.push(truck);
    }
  }

  // Death
  if (player.position.y < -8) { die(); return; }

  // FPS camera
  controls.getObject().position.set(
    player.position.x,
    player.position.y + 1.6,
    player.position.z
  );

  updateParticles(dt);
  composer.render();
}

function animate() {
  requestAnimationFrame(animate);
  update();
}

// ===================== AUDIO =====================

class Audio {
  constructor() {
    this.ctx = null; this.muted = false;
    this.bpm = 138; this.bi = 60 / this.bpm;
    this.nbt = 0; this.bc = 0;
    this.bass = [55, 55, 73.42, 65.41, 55, 82.41, 73.42, 55];
    this.mel = [220, 261.63, 293.66, 329.63, 293.66, 261.63, 220, 349.23];
    this.arp = [440, 523.25, 587.33, 659.25, 783.99, 659.25, 587.33, 523.25];
  }
  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.mg = this.ctx.createGain();
    this.mg.gain.value = 0.25;
    this.cp = this.ctx.createDynamicsCompressor();
    this.cp.threshold.value = -20; this.cp.ratio.value = 8;
    this.mg.connect(this.cp); this.cp.connect(this.ctx.destination);
    this.nbt = this.ctx.currentTime + 0.1;
    this.sched();
  }
  sched() {
    while (this.nbt < this.ctx.currentTime + 0.3) {
      this.pb(this.nbt, this.bc);
      this.nbt += this.bi; this.bc++;
    }
    requestAnimationFrame(() => this.sched());
  }
  pb(t, b) {
    if (this.muted) return;
    const bp = b % 8, sp = b % 16;
    if (sp === 0 || sp === 4 || sp === 8 || sp === 12) this.kick(t, sp % 8 === 0 ? .7 : .4);
    if (bp === 2 || bp === 6) this.snare(t);
    this.hh(t, sp % 2 === 0 ? .08 : .04);
    if (sp % 2 === 0) this.bn(t, this.bass[bp]);
    if (bp % 2 === 0) this.mn(t, this.mel[bp]);
    if (sp % 4 === 0) this.an(t, this.arp[sp % 8]);
  }
  kick(t, v) { const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(35, t + .12); g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(.001, t + .2); o.connect(g); g.connect(this.mg); o.start(t); o.stop(t + .2); }
  snare(t) { const b = this.ctx.createBuffer(1, this.ctx.sampleRate * .1, this.ctx.sampleRate), d = b.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const n = this.ctx.createBufferSource(); n.buffer = b; const g = this.ctx.createGain(); g.gain.setValueAtTime(.25, t); g.gain.exponentialRampToValueAtTime(.001, t + .1); const f = this.ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1000; n.connect(f); f.connect(g); g.connect(this.mg); n.start(t); n.stop(t + .1); }
  hh(t, v) { const b = this.ctx.createBuffer(1, this.ctx.sampleRate * .03, this.ctx.sampleRate), d = b.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const n = this.ctx.createBufferSource(); n.buffer = b; const g = this.ctx.createGain(); g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(.001, t + .03); const f = this.ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7000; n.connect(f); f.connect(g); g.connect(this.mg); n.start(t); n.stop(t + .03); }
  bn(t, f) { const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'sawtooth'; o.frequency.value = f; g.gain.setValueAtTime(.12, t); g.gain.exponentialRampToValueAtTime(.001, t + this.bi * .8); const fl = this.ctx.createBiquadFilter(); fl.type = 'lowpass'; fl.frequency.value = 300; o.connect(fl); fl.connect(g); g.connect(this.mg); o.start(t); o.stop(t + this.bi); }
  mn(t, f) { const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'square'; o.frequency.value = f; g.gain.setValueAtTime(.03, t); g.gain.exponentialRampToValueAtTime(.001, t + this.bi * .7); const fl = this.ctx.createBiquadFilter(); fl.type = 'lowpass'; fl.frequency.value = 1500; o.connect(fl); fl.connect(g); g.connect(this.mg); o.start(t); o.stop(t + this.bi); }
  an(t, f) { const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'triangle'; o.frequency.value = f; g.gain.setValueAtTime(.02, t); g.gain.exponentialRampToValueAtTime(.001, t + this.bi * .4); o.connect(g); g.connect(this.mg); o.start(t); o.stop(t + this.bi * .5); }
  playJumpSound() { if (!this.ctx || this.muted) return; const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(250, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(500, this.ctx.currentTime + .1); g.gain.setValueAtTime(.1, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001, this.ctx.currentTime + .12); o.connect(g); g.connect(this.mg); o.start(); o.stop(this.ctx.currentTime + .12); }
  playLandSound() { if (!this.ctx || this.muted) return; const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(180, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(60, this.ctx.currentTime + .1); g.gain.setValueAtTime(.15, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001, this.ctx.currentTime + .15); o.connect(g); g.connect(this.mg); o.start(); o.stop(this.ctx.currentTime + .15); }
  playDeathSound() { if (!this.ctx || this.muted) return; for (let i = 0; i < 5; i++) { const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(400 - i * 60, this.ctx.currentTime + i * .08); g.gain.setValueAtTime(.1, this.ctx.currentTime + i * .08); g.gain.exponentialRampToValueAtTime(.001, this.ctx.currentTime + i * .08 + .15); o.connect(g); g.connect(this.mg); o.start(this.ctx.currentTime + i * .08); o.stop(this.ctx.currentTime + i * .08 + .15); } }
  playDashSound() { if (!this.ctx || this.muted) return; const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(400, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + .12); g.gain.setValueAtTime(.08, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001, this.ctx.currentTime + .15); o.connect(g); g.connect(this.mg); o.start(); o.stop(this.ctx.currentTime + .15); }
  toggleMute() { this.muted = !this.muted; if (this.mg) this.mg.gain.value = this.muted ? 0 : .25; return this.muted; }
}

init();
</script>
