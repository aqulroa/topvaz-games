<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#f9d423"/><stop offset="100%" style="stop-color:#ff4e50"/></linearGradient></defs>
<rect width="512" height="512" fill="url(#bg)" rx="80"/>
<!-- Lemon -->
<ellipse cx="200" cy="180" rx="60" ry="50" fill="#f1c40f"/>
<ellipse cx="185" cy="170" rx="15" ry="12" fill="#f39c12" opacity="0.3"/>
<!-- Glass -->
<rect x="280" y="130" width="80" height="120" rx="5" fill="rgba(255,255,255,0.4)" stroke="#fff" stroke-width="3"/>
<rect x="290" y="145" width="60" height="90" fill="#f1c40f" opacity="0.6"/>
<!-- Straw -->
<rect x="330" y="100" width="8" height="100" rx="4" fill="#e74c3c" transform="rotate(15 334 150)"/>
<!-- Ice cubes -->
<rect x="295" y="150" width="20" height="20" rx="3" fill="rgba(255,255,255,0.6)"/>
<rect x="320" y="165" width="18" height="18" rx="3" fill="rgba(255,255,255,0.5)"/>
<!-- Stand table -->
<rect x="100" y="300" width="312" height="15" rx="5" fill="#8B4513"/>
<rect x="130" y="315" width="20" height="120" fill="#8B4513"/>
<rect x="362" y="315" width="20" height="120" fill="#8B4513"/>
<!-- Price tag -->
<rect x="160" y="255" width="100" height="40" rx="8" fill="#fff"/>
<text x="210" y="283" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="24" fill="#e74c3c">$1</text>
<!-- Title -->
<text x="256" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="36" fill="#fff">LEMONADE</text>
</svg>