<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannon Clash - Играть онлайн</title>
<link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(180deg,#87CEEB,#4682B4);overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
#gameCanvas{border:3px solid #FFD700;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,0.3);background:#87CEEB}
#menu{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:100}
#menu.hidden{display:none}
.menu-box{background:linear-gradient(135deg,#2C3E50,#34495E);padding:40px;border-radius:20px;text-align:center;max-width:600px;border:3px solid #FFD700}
.menu-title{font-size:48px;font-weight:900;color:#FFD700;margin-bottom:10px;text-shadow:3px 3px 6px #000}
.menu-subtitle{font-size:18px;color:#ECF0F1;margin-bottom:30px}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px}
.level-btn{background:linear-gradient(135deg,#3498DB,#2980B9);border:none;padding:20px;border-radius:15px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:all 0.3s}
.level-btn:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.3)}
.level-btn.locked{background:linear-gradient(135deg,#7F8C8D,#95A5A6);cursor:not-allowed;opacity:0.5}
#hud{position:fixed;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;z-index:50;pointer-events:none}
.hud-item{background:rgba(0,0,0,0.7);padding:10px 20px;border-radius:15px;color:#fff;font-weight:600;font-size:18px}
.hud-item span{color:#FFD700}
#endScreen{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:200}
#endScreen.show{display:flex}
.end-box{background:linear-gradient(135deg,#27AE60,#229954);padding:50px;border-radius:20px;text-align:center;max-width:500px;border:3px solid #FFD700}
.end-box.lose{background:linear-gradient(135deg,#E74C3C,#C0392B)}
.end-title{font-size:60px;font-weight:900;color:#fff;margin-bottom:20px}
.end-stars{font-size:80px;margin:20px 0}
.end-score{font-size:24px;color:#fff;margin:10px 0}
.end-score span{color:#FFD700;font-weight:700}
.btn-group{display:flex;gap:15px;margin-top:30px;justify-content:center}
.btn{background:linear-gradient(135deg,#3498DB,#2980B9);border:none;padding:15px 30px;border-radius:15px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:'Poppins',sans-serif}
.btn:hover{transform:translateY(-3px);box-shadow:0 8px 15px rgba(0,0,0,0.3)}
.btn.secondary{background:linear-gradient(135deg,#95A5A6,#7F8C8D)}
</style>
</head>
<body>
<canvas id="gameCanvas" width="1200" height="600"></canvas>
<div id="hud">
<div class="hud-item">Уровень: <span id="levelNum">1</span></div>
<div class="hud-item">Ядра: <span id="ballsLeft">5</span></div>
<div class="hud-item">Счёт: <span id="score">0</span></div>
</div>
<div id="menu">
<div class="menu-box">
<div class="menu-title">CANNON CLASH</div>
<div class="menu-subtitle">Сбей всех пиратов из пушки!</div>
<div class="level-grid" id="levelGrid"></div>
</div>
</div>
<div id="endScreen">
<div class="end-box" id="endBox">
<div class="end-title" id="endTitle">ПОБЕДА!</div>
<div class="end-stars" id="endStars">⭐⭐⭐</div>
<div class="end-score">Счёт: <span id="endScore">0</span></div>
<div class="btn-group">
<button class="btn" id="retryBtn">Повтор</button>
<button class="btn secondary" id="menuBtn">Меню</button>
<button class="btn" id="nextBtn">Далее</button>
</div>
</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let currentLevel=1,ballsLeft=5,score=0,gameState='menu';
let cannon={x:100,y:500,angle:-45,power:0};
let ball=null;
let pirates=[];
let structures=[];
let isAiming=false;

const LEVELS=[
{id:1,balls:5,pirates:[{x:900,y:400}],structures:[{x:900,y:450,w:100,h:20}]},
{id:2,balls:6,pirates:[{x:850,y:350},{x:950,y:350}],structures:[{x:900,y:450,w:150,h:20},{x:850,y:400,w:20,h:80},{x:950,y:400,w:20,h:80}]},
{id:3,balls:7,pirates:[{x:800,y:300},{x:900,y:300},{x:1000,y:300}],structures:[{x:800,y:450,w:100,h:20},{x:1000,y:450,w:100,h:20}]},
{id:4,balls:8,pirates:[{x:850,y:250},{x:950,y:250},{x:900,y:350}],structures:[{x:900,y:450,w:200,h:20}]},
{id:5,balls:7,pirates:[{x:850,y:300},{x:1000,y:300}],structures:[{x:850,y:450,w:100,h:20},{x:1000,y:450,w:100,h:20}]}
];

let progress={unlockedLevels:1,levelStars:Array(15).fill(0)};

function loadProgress(){
const saved=localStorage.getItem('cannonClashProgress');
if(saved)progress=JSON.parse(saved);
}

function saveProgress(){
localStorage.setItem('cannonClashProgress',JSON.stringify(progress));
}

function startLevel(level){
currentLevel=level;
const lvl=LEVELS[level-1];
ballsLeft=lvl.balls;
score=0;
pirates=lvl.pirates.map(p=>({...p,alive:true}));
structures=lvl.structures.map(s=>({...s}));
ball=null;
document.getElementById('menu').classList.add('hidden');
gameState='playing';
updateHUD();
}

function updateHUD(){
document.getElementById('levelNum').textContent=currentLevel;
document.getElementById('ballsLeft').textContent=ballsLeft;
document.getElementById('score').textContent=score;
}

function showMenu(){
gameState='menu';
document.getElementById('menu').classList.remove('hidden');
document.getElementById('endScreen').classList.remove('show');
const grid=document.getElementById('levelGrid');
grid.innerHTML='';
for(let i=1;i<=5;i++){
const btn=document.createElement('button');
btn.className='level-btn';
btn.textContent=i;
if(i<=progress.unlockedLevels){
btn.onclick=()=>startLevel(i);
}else{
btn.classList.add('locked');
btn.textContent='🔒';
}
grid.appendChild(btn);
}
}

function showEndScreen(won){
gameState='end';
const endScreen=document.getElementById('endScreen');
const endBox=document.getElementById('endBox');
const endTitle=document.getElementById('endTitle');
const endStars=document.getElementById('endStars');
const endScore=document.getElementById('endScore');
if(won){
const stars=ballsLeft>3?3:ballsLeft>1?2:1;
if(currentLevel===progress.unlockedLevels&&currentLevel<5){
progress.unlockedLevels++;
}
if(stars>progress.levelStars[currentLevel-1]){
progress.levelStars[currentLevel-1]=stars;
}
saveProgress();
endBox.classList.remove('lose');
endTitle.textContent='ПОБЕДА!';
endStars.textContent='⭐'.repeat(stars);
endScore.textContent=score;
document.getElementById('nextBtn').style.display=currentLevel<5?'block':'none';
}else{
endBox.classList.add('lose');
endTitle.textContent='ПОРАЖЕНИЕ';
endStars.textContent='';
endScore.textContent=score;
document.getElementById('nextBtn').style.display='none';
}
endScreen.classList.add('show');
}

function checkWin(){
const alive=pirates.filter(p=>p.alive).length;
if(alive===0){
showEndScreen(true);
}else if(ballsLeft===0&&!ball){
showEndScreen(false);
}
}

canvas.addEventListener('mousemove',e=>{
if(gameState!=='playing')return;
const rect=canvas.getBoundingClientRect();
const mx=e.clientX-rect.left;
const my=e.clientY-rect.top;
const dx=mx-cannon.x;
const dy=my-cannon.y;
cannon.angle=Math.atan2(dy,dx)*180/Math.PI;
if(cannon.angle>0)cannon.angle=0;
if(cannon.angle<-90)cannon.angle=-90;
});

canvas.addEventListener('mousedown',e=>{
if(gameState!=='playing'||ballsLeft<=0||ball)return;
isAiming=true;
cannon.power=0;
});

canvas.addEventListener('mouseup',e=>{
if(!isAiming)return;
isAiming=false;
const angle=cannon.angle*Math.PI/180;
ball={
x:cannon.x+Math.cos(angle)*60,
y:cannon.y+Math.sin(angle)*60,
vx:Math.cos(angle)*cannon.power*0.3,
vy:Math.sin(angle)*cannon.power*0.3,
r:10
};
ballsLeft--;
updateHUD();
});

document.getElementById('retryBtn').onclick=()=>{
document.getElementById('endScreen').classList.remove('show');
startLevel(currentLevel);
};

document.getElementById('menuBtn').onclick=()=>showMenu();

document.getElementById('nextBtn').onclick=()=>{
document.getElementById('endScreen').classList.remove('show');
startLevel(currentLevel+1);
};

function update(){
if(gameState!=='playing')return;

if(isAiming){
cannon.power=Math.min(cannon.power+2,100);
}

if(ball){
ball.vy+=0.5;
ball.x+=ball.vx;
ball.y+=ball.vy;

if(ball.y>600||ball.x<0||ball.x>1200){
ball=null;
checkWin();
return;
}

pirates.forEach(p=>{
if(!p.alive)return;
const dist=Math.hypot(ball.x-p.x,ball.y-p.y);
if(dist<30){
p.alive=false;
score+=100;
updateHUD();
ball=null;
checkWin();
}
});
}
}

function draw(){
ctx.fillStyle='#87CEEB';
ctx.fillRect(0,0,1200,600);

ctx.fillStyle='#8B4513';
ctx.fillRect(0,580,1200,20);

structures.forEach(s=>{
ctx.fillStyle='#A0522D';
ctx.fillRect(s.x-s.w/2,s.y-s.h/2,s.w,s.h);
});

pirates.forEach(p=>{
if(!p.alive)return;
ctx.fillStyle='#FFE4B5';
ctx.beginPath();
ctx.arc(p.x,p.y,20,0,Math.PI*2);
ctx.fill();
ctx.fillStyle='#000';
ctx.beginPath();
ctx.moveTo(p.x-25,p.y-20);
ctx.lineTo(p.x,p.y-35);
ctx.lineTo(p.x+25,p.y-20);
ctx.closePath();
ctx.fill();
});

ctx.save();
ctx.translate(cannon.x,cannon.y);
ctx.rotate(cannon.angle*Math.PI/180);
ctx.fillStyle='#2C2C2C';
ctx.fillRect(0,-10,60,20);
ctx.restore();
ctx.fillStyle='#8B4513';
ctx.beginPath();
ctx.arc(cannon.x,cannon.y,25,0,Math.PI*2);
ctx.fill();

if(ball){
ctx.fillStyle='#1A1A1A';
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

if(isAiming){
const angle=cannon.angle*Math.PI/180;
ctx.strokeStyle='rgba(255,255,255,0.5)';
ctx.lineWidth=2;
ctx.setLineDash([5,5]);
ctx.beginPath();
ctx.moveTo(cannon.x+Math.cos(angle)*60,cannon.y+Math.sin(angle)*60);
let x=cannon.x+Math.cos(angle)*60;
let y=cannon.y+Math.sin(angle)*60;
let vx=Math.cos(angle)*cannon.power*0.3;
let vy=Math.sin(angle)*cannon.power*0.3;
for(let i=0;i<30;i++){
x+=vx;
y+=vy;
vy+=0.5;
ctx.lineTo(x,y);
if(y>600)break;
}
ctx.stroke();
ctx.setLineDash([]);
}
}

function gameLoop(){
update();
draw();
requestAnimationFrame(gameLoop);
}

loadProgress();
showMenu();
gameLoop();
</script>
</body>
</html>
